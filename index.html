 "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He doesn’t like ____.", "options": ["to cooks", "cooking", "cook", "cooks"], "answer": "cooking", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: It ____ a lot in Abha in winter.", "options": ["rains", "rain", "raining", "to rain"], "answer": "rains", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: The computer ____ well.", "options": ["works", "work", "working", "to work"], "answer": "works", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Tom ____ thirteen and lives in Melbourne.", "options": ["are", "am", "be", "is"], "answer": "is", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Annie ____ tennis every day.", "options": ["playing", "to play", "plays", "play"], "answer": "plays", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ a lot of books about food.", "options": ["to read", "reads", "read", "reading"], "answer": "reads", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: She ____ the computer to talk to friends.", "options": ["to use", "uses", "use", "using"], "answer": "uses", "feedback": "Review the unit language, then try again."}]}, "reading": {"text": "Reading – Four People in Different Countries\n\nTeresa from Spain\nI moved to Canada last year with my family. My friends told me English is difficult to learn, but it's easy for me. I take classes at school to learn more. I also watch movies with English subtitles. People in Canada are very friendly. They say “thank you” and “sorry” a lot. I love going to the park and playing football in my free time.\n\nAhmed from Egypt\nI am living in Germany for my job. Learning German is not easy. I study every night after work. I also practice with my German neighbours and try to learn from them. On Saturday and Sunday, I go hiking with my friends. It is my new favourite hobby.\n\nLing from China\nI came to Australia to study. I didn’t speak English when I moved, but I’m learning now. I speak English every day with my classmates. Australian people are very relaxed and they are great! They love barbecues. After school and at the weekend, I go to the beach or learn how to surf. I enjoy my new life here.\n\nCarlos from Brazil\nI moved to Japan for work. Japanese is very hard, but I am learning slowly. I take lessons at night. People here are very polite, and I like learning about Japanese culture. In my free time, I visit temples and try local food. My favourite is sushi.\n\n---\n\nReading – Going to the Cinema\n\nI love going to the cinema. Every Friday, my friends and I choose a movie to watch. We usually go to the evening show, which starts at 7:00 PM. Before the movie, we grab a quick bite to eat at the café near the cinema. I enjoy having popcorn and a soda during the film. My favorite types of movies are action and comedy because I like exciting stories and laughing. After the movie, we often talk about it for a while and then head home. Sometimes, we plan to watch another movie the next week. I always look forward to our cinema trips because they are a fun way to relax and spend time with friends.", "questions": [{"type": "mcq", "text": "Teresa watches football when she is not studying.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Teresa thinks English is easy for her.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Ahmed moved to Germany for work.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Ahmed doesn’t stay at home at the weekend.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Ling doesn’t like people from Australia.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Ling spends her free time by the sea.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Carlos moved to Japan to study.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Carlos likes Japanese food.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "When does the person go to the cinema?", "options": ["On Saturdays", "On Fridays", "On Sundays", "On Thursdays"], "answer": "On Fridays", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What time does the movie usually start?", "options": ["6:00 PM", "7:00 PM", "8:00 PM", "9:00 PM"], "answer": "7:00 PM", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What do they do before the movie?", "options": ["Go shopping", "Eat at the café near the cinema", "Take a walk around the cinema", "Wait in line for tickets"], "answer": "Eat at the café near the cinema", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does the person enjoy during the film?", "options": ["Ice cream", "Popcorn and soda", "Sandwiches", "Candy and water"], "answer": "Popcorn and soda", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What type of movies does the person enjoy most?", "options": ["Drama and romance", "Horror and thriller", "Science fiction", "Actio ], "answer": "go to bed", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "13. Which phrase is about frequency?", "options": ["usually", "Tuesday", "July", "quarter"], "answer": "usually", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "14. Which phrase means “not often”?", "options": ["every day", "usually", "hardly ever", "always"], "answer": "hardly ever", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "15. Which phrase means “100% of the time”?", "options": ["never", "sometimes", "hardly ever", "always"], "answer": "always", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "16. Which phrase means “0% of the time”?", "options": ["often", "usually", "sometimes", "never"], "answer": "never", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "17. Which one is NOT a time expression?", "options": ["on Friday", "accountant", "at night", "in the morning"], "answer": "accountant", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "18. Which question asks about routine?", "options": ["What time do you get up?", "What’s your surname?", "Are you from Japan?", "How do you spell bank?"], "answer": "What time do you get up?", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "19. Which phrase best completes: “I have lunch ____ one o’clock.”", "options": ["in", "from", "at", "on"], "answer": "at", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "20. Which phrase best completes: “I play football ____ Fridays.”", "options": ["at", "in", "to", "on"], "answer": "on", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "21. Which phrase best ing at the mall at 7?"], "answer": "Can we meet at the mall at 7?", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I’m sorry, I ____ come tonight.", "options": ["am not can", "doesn’t can", "can’t", "don’t can"], "answer": "can’t", "feedback": "Review the unit language, then try again."}]}, "reading": {"text": "Reading – People in the UK\n\nYuki from Japan\nI like living in the UK. People are always polite and friendly, which makes me feel welcome. I often miss my family and I don’t like the weather, but I love the green parks. I enjoy drinking tea with my friends and learning about British culture. British food is different, but I like it. I sometimes miss Japanese food.\n\nCarlos from Spain\nIn the UK, people drink tea many times a day, which is interesting to me. I often see them queuing for everything, and I think it’s very polite. I sometimes cook and often eat in restaurants. In the UK, there are beautiful parks and green countryside. The restaurants are nice places to go with friends.\n\nAnna from Poland\nI like British customs very much. People say “please” and “thank you” all the time, which is very polite. It rains a lot in the UK, and everyone has an umbrella. I enjoy visiting the museums, which are usually free. I hate food here, but the old buildings and the history are interesting.\n\nAhmed from Egypt\nIn many countries, people are often late, but in the UK, people are always on time, which is good. They drink tea very often. I also drink a lot of tea. I usually stay at home because I do not feel very warm. I sometimes miss the nice weather of my country.\n\n---\n\nReading – Hobbies and Interests\n\nMy name is Sara, and I have many hobbies. I love painting, especially landscapes. I started painting when I was 10 years old, and now I try to paint every weekend. I also enjoy reading books, especially mystery novels. My favorite author is Agatha Christie. I spend at least an hour every day reading. In addition to painting and reading, I enjoy playing the piano. I have been taking piano lessons since I was 8 years old. On weekends, I usually play songs that I learned in my lessons. I also like swimming and go to the pool every Thursday evening. Hobbies are important to me because they help me relax and forget about schoolwork.", "questions": [{"type": "mcq", "text": "Yuki doesn’t like the British weather.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Yuki enjoys learning about British culture.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Carlos likes going out with friends to restaurants.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Carlos doesn’t like drinking tea.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Anna thinks British people are very polite.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Anna doesn’t like British food.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Ahmed says that houses in the UK are very cold.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Ahmed thinks British people are sometimes late.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What is Sara's main hobby?", "options": ["Playing the piano", "Reading books", "Swimming", "Painting"], "answer": "Painting", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "How old was Sara when she started her favourite hobby?", "options": ["At the age of 8", "At the age of 10", "At the age of 12", "When she was a teenager"], "answer": "At the age of 10", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Which type of books does Sara prefer?", "options": ["Romance", "Fantasy", "Mystery", "History"], "answer": "Mystery", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "How long does Sara spend reading every day?", "options": ["30 minutes", "60 minutes", "Half an hour", "2 hours"], "answer": "60 minutes", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Who is Sara's favourite writer?", "options": ["J.K. Rowling", "Agatha Christie", "Leo Tolstoy", "Charles Dickens"], "answer": "Agatha Christie", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "When did Sara start piano lessons?", "options": ["Since she was 5", "Since she was 8", "Since she was 10", "Since she was 12"], "answer": "Since she was 8", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does Sara usually do on weekends?", "options": ["Paint and play the piano", "Play football", "Clean and work", "Go shopping"], "answer": "Paint and play the piano", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "When does Sara go swimming?", "options": ["Every day", "On weekends", "On Thursdays", "On Fridays"], "answer": "On Thursdays", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Why are hobbies important to Sara?", "options": ["They help her study better", "They help her relax and forget schoolwork", "They make her rich", "They help her learn new things"], "answer": "They help her relax and forget schoolwork", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Which is NOT one of Sara's hobbies?", "options": ["Reading books", "Playing the piano", "Playing football", "Swimming"], "answer": "Playing football", "feedback": "Read the text carefully, then choose the best answer."}]}, "speaking": ["What time do you get up?", "When is your English class?", "What do you do on Friday evening?", "Are you busy this week?", "When can you meet your friend?"], "listening": [{"title": "Exercise 1: Schedule", "audio": "CE L2 Listening U07 EX.1.mp3", "script": "Emma and Jack talk about their weekly schedules: breakfast, English class, doctor’s appointment, tennis, party and TV programme.", "questions": [{"type": "match", "title": "Match the activity with the correct day and time", "left": ["Breakfast", "English class", "Doctor’s appointment", "Tennis lesson", "Birthday party", "Favourite TV programme"], "right": ["A. On Monday at a quarter past seven", "B. On Monday at half past eight", "C. On Monday at a quarter past ten", "D. On Tuesday at three twenty-five", "E. On Tuesday at three o’clock", "F. On Friday at a quarter to seven", "G. On Friday at a quarter past eight", "H. On Tuesday at quarter past four"], "answer": ["A", "B", "C", "D", "F", "G"]}, {"type": "order", "title": "Put Jack's Monday events in order", "items": ["Doctor’s appointment", "Breakfast", "English class"], "answer": [3, 1, 2]}, {"type": "mcq", "text": "When is the birthday party?", "options": ["Monday morning", "Tuesday afternoon", "Friday evening", "Sunday morning"], "answer": "Friday evening", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "When is Jack’s favourite TV programme?", "options": ["Friday at quarter past eight", "Tuesday at three o'clock", "Monday at half past eight", "Friday at seven"], "answer": "Friday at quarter past eight", "feedback": "Listen again and check the key words."}]}]}, {"id": 8, "title": "You Can Do It", "focus": "can/can't, sports, abilities", "vocabulary": [], "vocabQuestions": [{"type": "mcq", "text": "1. Which phrase is about ability?", "options": ["I like rice.", "I’m from Dammam.", "It’s on Monday.", "I can swim."], "answer": "I can swim.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "2. Which phrase is about inability?", "options": ["I drive every day.", "I’m a driver.", "I like driving.", "I can’t drive."], "answer": "I can’t drive.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "3. Which word is a part of the body?", "options": ["hobby", "hand", "hotel", "holiday"], "answer": "hand", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "4. Which word is a part of the body?", "options": ["foot", "food", "flat", "friend"], "answer": "foot", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "5. Which phrase is correct?", "options": ["touch toes your", "touch to toes", "touch your toes", "touch your foots"], "answer": "touch your toes", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "6. Which phrase is about sport?", "options": ["run fast", "read music", "speak French", "write an email"], "answer": "run fast", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "7. Which phrase is about music ability?", "options": ["play the piano", "play the computer", "play a photo", "play a car"], "answer": "play the piano", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "8. Which phrase is correct?", "options": ["make a photograph", "do a photograph", "play a photograph", "take a photograph"], "answer": "take a photograph", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "9. Which word is closest to “good with numbers”?", "options": ["can cook well", "can calculate well", "can sing well", "can run quickly"], "answer": "can calculate well", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "10. Which phrase means language ability?", "options": ["drive a foreign language", "play a foreign language", "speak a foreign language", "cook a foreign language"], "answer": "speak a foreign language", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "11. Which one is a request?", "options": ["He likes football.", "There is a bank.", "Can you help me, please?", "I can swim."], "answer": "Can you help me, please?", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "12. Which answer accepts a request?", "options": ["Yes, of course.", "No, I’m not a city.", "I’m from Jeddah.", "It is a mountain."], "answer": "Yes, of course.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "13. Which answer refuses a request politely?", "options": ["Yes, they are.", "It is cheap.", "He is my uncle.", "Sorry, I can’t."], "answer": "Sorry, I can’t.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "14. Which phrase is a custom?", "options": ["shake hands", "study medicine", "buy a sofa", "watch a film"], "answer": "shake hands", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "15. Which phrase uses body language?", "options": ["drive a car", "hold your thumb up", "eat pasta", "write an email"], "answer": "hold your thumb up", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "16. Which phrase is about public behaviour?", "options": ["do homework at home", "cook in the kitchen", "watch TV at night", "blow your nose in public"], "answer": "blow your nose in public", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "17. Which phrase is correct?", "options": ["look to the person’s eyes", "look on the person’s eyes", "look for person eyes", "look at the person’s eyes"], "answer": "look at the person’s eyes", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "18. Which phrase is correct?", "options": ["eat on your right hand", "eat right your hand", "eat with your right hand", "eat by your right hand"], "answer": "eat with your right hand", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "19. Which phrase is NOT an ability?", "options": ["read music", "birthday party", "swim 25 metres", "play chess"], "answer": "birthday party", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "20. Which word best fits: “He is a good ____.”", "options": ["swam", "swimmer", "swim", "swimming"], "answer": "swimmer", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "21. Which word best fits: “She is very ____.”", "options": ["act", "active", "activity", "actively"], "answer": "active", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "22. Which phrase is about art?", "options": ["go to a bus stop", "go to bed", "go to school by bus", "go to art galleries"], "answer": "go to art galleries", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "23. Which phrase is about mental ability?", "options": ["touch your toes", "go swimming", "do maths in your head", "stand on your head"], "answer": "do maths in your head", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "24. Which one is an interest?", "options": ["surname", "phone number", "bus stop", "photography"], "answer": "photography", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "25. Which one is NOT a body part?", "options": ["cinema", "head", "arm", "leg"], "answer": "cinema", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "26. Which phrase is about team games?", "options": ["write an email", "watch TV alone", "play basketball", "read books alone"], "answer": "play basketball", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "27. Which phrase means physically fit?", "options": ["keep a phone", "keep a surname", "keep a café", "keep fit"], "answer": "keep fit", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "28. Which phrase is correct?", "options": ["interested to sports", "interested in sports", "interested on sports", "interested at sports"], "answer": "interested in sports", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "29. Which activity can you do at a swimming pool?", "options": ["drive", "paint a house", "buy fruit", "swim"], "answer": "swim", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "30. Which phrase is best for Unit 8?", "options": ["food and drink", "skills and interests", "countries and nationalities", "family members"], "answer": "skills and interests", "feedback": "Think about the context, collocation, and unit vocabulary."}], "grammar": {"point": "can / can't", "examples": ["I can swim.", "He can't run 15 kilometres.", "Can you speak English?", "Yes, I can."], "questions": [{"type": "mcq", "text": "Complete: I ____ swim 25 metres.", "options": ["have", "can", "do", "am"], "answer": "can", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He _ a request.", "options": ["It is Thursday.", "She is a nurse.", "Yes, of course.", "I am Dammam."], "answer": "Yes, of course.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: You ____ put your feet on a chair in Thailand.", "options": ["cannot", "don’t can", "aren’t can", "not can"], "answer": "cannot", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: In Dubai, you shake hands ____ your right hand.", "options": ["to", "with", "on", "at"], "answer": "with", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: In India, people eat ____ their hands.", "options": ["to", "with", "on", "at"], "answer": "with", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: In Britain, you can hold your thumb ____.", "options": ["up", "in", "at", "on"], "answer": "up", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: How many languages can you ____?", "options": ["to speak", "speak", "speaks", "speaking"], "answer": "speak", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Are you good ____ numbers?", "options": ["at to", "on", "for to", "with"], "answer": "with", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I’m interested ____ photography.", "options": ["to", "in", "on", "at"], "answer": "in", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Can you do this ____ your head?", "options": ["to", "in", "on", "at"], "answer": "in", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He is good at ____.", "options": ["spelling", "spell", "spells", "to spells"], "answer": "spelling", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Can you ____ your toes?", "options": ["to touch", "touch", "touches", "touching"], "answer": "touch", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ run very fast.", "options": ["is", "does", "has", "can"], "answer": "can", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I ____ remember phone numbers.", "options": ["can’t", "don’t can", "not can", "am not can"], "answer": "can’t", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: She can’t ____ music.", "options": ["read", "reads", "reading", "to read"], "answer": "read", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: They can ____ very well.", "options": ["dances", "dancing", "to dance", "dance"], "answer": "dance", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He can speak English, but he ____ speak French.", "options": ["isn’t", "don’t", "can’t", "doesn’t"], "answer": "can’t", "feedback": "Review the unit language, then try again."}]}, "reading": {"text": "Reading – My Wonderful Family\n\nI live in a house near the mountains. I have two brothers and one sister, and I was born last. My father teaches mathematics, and my mother is a nurse at a big hospital. My brothers are very smart and work hard in school. My sister is a nervous girl, but she is very kind. My grandmother also lives with us. She came from Italy when I was two years old. She always cooks the best food.\n\nMy family is very important to me. We do lots of things together. My brothers and I like to go on long walks in the mountains. My sister likes to cook with my grandmother. On the weekends, we all play board games together. We laugh and always have a good time. I love my family very much.\n\n---\n\nReading – A Trip to the Zoo\n\nLast weekend, I went to the zoo with my family. We arrived early in the morning to see all the animals. First, we visited the monkeys. They were playing in their cage and making funny noises. Then, we went to see the elephants. They were very large and calm. My little brother loved the lions because they looked strong and powerful. After that, we had lunch at the zoo restaurant. The food was good, but it was a little expensive. In the afternoon, we watched a show with dolphins. The dolphins were very smart and performed tricks. We spent the whole day at the zoo, and I really enjoyed it because I love animals.", "questions": [{"type": "mcq", "text": "The writer's mother is a _____.", "options": ["doctor", "nurse", "writer", "waitress"], "answer": "nurse", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "The house is near the _____.", "options": ["city", "monastery", "mountains", "Italy"], "answer": "mountains", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "How old was the writer when the grandmother came?", "options": ["three years old", "born", "ten years old", "two years old"], "answer": "two years old", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "On the weekend, they _____.", "options": ["play board games together", "go to a movie", "clean the house", "cook pasta"], "answer": "play board games together", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "The writer's sister is kind, but also _____.", "options": ["mean", "quiet", "nervous", "strong"], "answer": "nervous", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Who cooks the best food?", "options": ["The father", "The mother", "The grandmother", "The brothers"], "answer": "The grandmother", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What time did the family arrive at the zoo?", "options": ["At 10 a.m.", "Early in the morning", "At noon", "Late in the evening"], "answer": "Early in the morning", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Which animals did the family visit first?", "options": ["Elephants", "Lions", "Monkeys", "Dolphins"], "answer": "Monkeys", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Why did the little brother like the lions?", "options": ["They were cute", "They looked strong and powerful", "They were playing", "They were calm"], "answer": "They looked strong and powerful", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Where did the family eat lunch?", "options": ["At home", "At the zoo restaurant", "At a nearby café", "At the lion exhibit"], "answer": "At the zoo restaurant", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What was the food like?", "options": ["Little", "Cheap but horrible", "Expensive but good", "Free"], "answer": "Expensive but good", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What did the family do in the afternoon?", "options": ["Watch a movie", "Visit the lions again", "Watch a dolphin show", "Ride a zoo train"], "answer": "Watch a dolphin show", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "How were the dolphins described?", "options": ["Lazy", "Clever and did tricks", "Slow and boring", "Shy and quiet"], "answer": "Clever and did tricks", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What did the family enjoy most?", "options": ["Seeing the lions", "Watching the dolphin show", "The food", "The animals"], "answer": "The animals", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "How long did the family stay at the zoo?", "options": ["Half a day", "All day", "Just a few hours", "Until evening"], "answer": "All day", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does the person like most?", "options": ["Lions", "Dolphins", "Animals", "Food"], "answer": "Animals", "feedback": "Read the text carefully, then choose the best answer."}]}, "speaking": ["Can you swim?", "Can you run fast?", "What sports do you like?", "How many days a week do you exercise?", "Can you speak a foreign language?"], "listening": [{"title": "Exercise 1: Holidays and Activities", "audio": "CE Listening L2 U08 EX.1.mp3", "script": "Sara and Alex talk about holidays, hotels, transport, photos, shopping, music and chess.", "questions": [{"type": "tf", "text": "Alex usually stays in a hotel near the beach and likes camping.", "options": ["True", "False"], "answer": "False", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "Alex prefers travelling by bus because it is fast and comfortable.", "options": ["True", "False"], "answer": "False", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "Sara travels by car with her family and visits the city centre.", "options": ["True", "False"], "answer": "True", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "Sara enjoys shopping and spending money on restaurants.", "options": ["True", "False"], "answer": "False", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "In the evening, Alex sings songs or listens to music, while Sara plays chess with her family.", "options": ["True", "False"], "answer": "True", "feedback": "Check the sentence in the audio."}, {"type": "order", "title": "Put the holiday activities in order from Sara/Alex's conversation", "items": ["Travel to another city", "Stay near the beach", "Go shopping / take photos", "Do evening activities"], "answer": [1, 2, 3, 4]}]}, {"title": "Exercise 2: Sports and Abilities", "audio": "CE Listening L2 U08 EX.2.mp3", "script": "Nora asks Ben about sports, exercise, abilities and languages.", "questions": [{"type": "mcq", "text": "What sports does Ben like?", "options": ["Swimming and cycling", "Tennis only", "Football only"], "answer": "Swimming and cycling", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "Can Ben run 15 kilometers?", "options": ["Yes, easily", "No, but he can run fast to catch the bus", "No, he can't run at all"], "answer": "No, but he can run fast to catch the bus", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "Does Ben walk to work every day?", "options": ["Yes", "No", "Only at the weekend"], "answer": "Yes", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "Can Ben stand on his hands?", "options": ["Yes", "No", "Only with friends"], "answer": "No", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "How many days a week does Ben exercise?", "options": ["Two", "Four", "Seven"], "answer": "Four", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "Can Ben speak a foreign language?", "options": ["English well and a little French", "Arabic only", "No"], "answer": "English well and a little French", "feedback": "Listen again and check the key words."}]}]}, {"id": 9, "title": "Now and Then", "focus": "dates, years, was/were, famous people", "vocabulary": [], "vocabQuestions": [{"type": "mcq", "text": "1. Which word is a month?", "options": ["September", "Sunday", "morning", "quarter"], "answer": "September", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "2. Which ordinal number is 13th?", "options": ["thirteenth", "thirtieth", "third", "thirty-third"], "answer": "thirteenth", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "3. Which ordinal number is 22nd?", "options": ["twenty-third", "twenty-second", "twentieth", "twenty-first"], "answer": "twenty-second", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "4. Which phrase is correct for a date?", "options": ["sixth February of", "the sixth of February", "six February", "February sixs"], "answer": "the sixth of February", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "5. Which word completes: “I was born ____ 2005.”", "options": ["to", "in", "on", "at"], "answer": "in", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "6. Which word completes: “I was born ____ the 3rd of May.”", "options": ["from", "on", "in", "at"], "answer": "on", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "7. Which word is about childhood?", "options": ["primary school", "shopping centre", "coffee shop", "bus stop"], "answer": "primary school", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "8. Which word is a school subject?", "options": ["cinema", "beach", "surname", "maths"], "answer": "maths", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "9. Which phrase asks about childhood personality?", "options": ["Can you buy a phone?", "Is there a café?", "Do you like rice?", "Were you quiet or noisy?"], "answer": "Were you quiet or noisy?", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "10. Which one is a life date?", "options": ["Monday morning", "breakfast", "1986", "quarter past"], "answer": "1986", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "11. Which word means “not loud”?", "options": ["quiet", "noisy", "active", "creative"], "answer": "quiet", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "12. Which word means “loud and active”?", "options": ["early", "noisy", "quiet", "polite"], "answer": "noisy", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "13. Which phrase is used for remembering the past?", "options": ["shopping list", "phone number", "email address", "childhood memory"], "answer": "childhood memory", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "14. Which phrase is about a famous person?", "options": ["a bottle of water", "my email address", "President of the USA", "bus stop near the café"], "answer": "President of the USA", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "15. Which word is a place of birth?", "options": ["noisy", "maths", "Mvezo", "thirteenth"], "answer": "Mvezo", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "16. Which phrase is correct?", "options": ["born in Spain", "born on Spain", "born at Spain", "born to Spain"], "answer": "born in Spain", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "17. Which phrase is correct?", "options": ["born in 18 July", "born at 18 July", "born to 18 July", "born on 18 July"], "answer": "born on 18 July", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "18. Which word means “a person who leads a country”?", "options": ["shop assistant", "grandson", "president", "student"], "answer": "president", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "19. Which phrase belongs to years?", "options": ["half past two", "Sunday morning", "nineteen eighty-six", "quarter past eight"], "answer": "nineteen eighty-six", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "20. Which word is NOT a month?", "options": ["March", "December", "Monday", "January"], "answer": "Monday", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "21. Which answer fits: “When were you born?”", "options": ["I like coffee.", "In 2004.", "In Dammam Mall.", "I can swim."], "answer": "In 2004.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "22. Which answer fits: “Where were you born?”", "options": ["In 2011.", "At seven o’clock.", "On Friday.", "In Riyadh."], "answer": "In Riyadh.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "23. Which phrase is about family in the past?", "options": ["favourite coffee in my café", "favourite bus stop", "favourite bank account", "favourite person in my family"], "answer": "favourite person in my family", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "24. Which word is closest to “interests”?", "options": ["things you like doing", "things you hate only", "dates of birth", "phone numbers"], "answer": "things you like doing", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "25. Which phrase is about a sports event?", "options": ["black coffee", "World Cup", "email address", "surname"], "answer": "World Cup", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "26. Which word is a country?", "options": ["February", "thirteenth", "quarter", "Mexico"], "answer": "Mexico", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "27. Which word is a nationality?", "options": ["March", "football", "Spanish", "Spain"], "answer": "Spanish", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "28. Which phrase is a correct school collocation?", "options": ["best friend of number", "best friend at school", "best friend in bus", "best friend at food"], "answer": "best friend at school", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "29. Which phrase is a good speaking-card topic?", "options": ["Describe one childhood memory.", "Spell a mountain.", "Order a nationality.", "Buy a date."], "answer": "Describe one childhood memory.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "30. Which phrase belongs to Unit 9 vocabulary?", "options": ["months and dates", "a/an with jobs", "food and drink", "places in town"], "answer": "months and dates", "feedback": "Think about the context, collocation, and unit vocabulary."}], "grammar": {"point": "was / were", "examples": ["He was born in 1918.", "They were friends.", "She wasn't in London.", "Were you quiet?"], "questions": [{"type": "mcq", "text": "Complete: I ____ born in Riyadh.", "options": ["am", "are", "was", "were"], "answer": "was", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: My brothers ____ noisy when they were children.", "options": ["was", "are", "is", "were"], "answer": "were", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: She ____ quiet at school.", "options": ["are", "was", "were", "is"], "answer": "was", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: We ____ in Jeddah in 2010.", "options": ["are", "is", "were", "was"], "answer": "were", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct question.", "options": ["Did you were good at sport?", "Are you were good at sport?", "Were you good at sport?", "Was you good at sport?"], "answer": "Were you good at sport?", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct short answer.", "options": ["Yes, I am.", "Yes, I was.", "Yes, I were.", "Yes, I did."], "answer": "Yes, I was.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ very good at maths.", "options": ["isn’t", "wasn’t", "weren’t", "didn’t"], "answer": "wasn’t", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: They ____ friends at primary school.", "options": ["were", "was", "is", "am"], "answer": "were", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: ____ your favourite subject English?", "options": ["Did", "Do", "Was", "Were"], "answer": "Was", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: ____ your parents nice to you?", "options": ["Did", "Are", "Were", "Was"], "answer": "Were", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I was born ____ 2006.", "options": ["at", "to", "in", "on"], "answer": "in", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He was born ____ the third of May.", "options": ["at", "to", "on", "in"], "answer": "on", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: The festival was ____ February.", "options": ["on", "at", "to", "in"], "answer": "in", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct date form.", "options": ["the twenty-two of March", "the twenty-second of March", "twenty-two March", "March twenty-two of"], "answer": "the twenty-second of March", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct sentence.", "options": ["When was your sister born?", "When were your sister born?", "When did your sister was born?", "When your sister was born?"], "answer": "When was your sister born?", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: My favourite people ____ my grandparents.", "options": ["was", "is", "am", "were"], "answer": "were", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: My best friend ____ in my class.", "options": ["was", "were", "are", "be"], "answer": "was", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct negative.", "options": ["I didn’t noisy.", "I am not noisy yesterday.", "I wasn’t noisy.", "I weren’t noisy."], "answer": "I wasn’t noisy.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: DVDs ____ popular then.", "options": ["weren’t", "wasn’t", "didn’t", "aren’t"], "answer": "weren’t", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Ronald Reagan ____ President of the USA.", "options": ["was", "were", "is", "are"], "answer": "was", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Argentina ____ the World Cup.", "options": ["winning", "won", "win", "wins"], "answer": "won", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Diego Maradona ____ the captain.", "options": ["is", "are", "was", "were"], "answer": "was", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: How old ____ he?", "options": ["do", "was", "were", "did"], "answer": "was", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Who ____ your best friend?", "options": ["were", "did", "do", "was"], "answer": "was", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: What ____ your interests?", "options": ["did", "do", "were", "was"], "answer": "were", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ not good at football.", "options": ["did", "is", "was", "were"], "answer": "was", "feedback": "Review the unit language, then try again."}]}, "reading": {"text": "Reading – Four People\n\nMaria\nHello! My name is Maria and I’m from Spain. I am a teacher. I work with young children. In my free time, I like to read books and cook Spanish food for my family. At the weekend, I enjoy meeting friends.\n\nTom\nHi! I’m Tom and I come from the United States. I’m a doctor. I love basketball; I often play it with friends on the weekend. In the evenings, I usually watch films at home with my friends. On Sundays, I often go hiking in the mountains to take pictures. I have a younger sister. She lives with our parents.\n\nAiko\nGood morning! I’m Aiko and I’m from Japan. I don’t work because I’m a student studying medicine. I’d like to be a doctor and work in a big hospital. I don’t go out a lot because I like to spend time by myself. I even travel alone. I don’t have brothers or sisters, and my friends don’t like traveling. I don’t like watching TV, so I always play video games after dinner.\n\nLuis\nHey, how are you? I’m Luis from Brazil but I live in Australia. I’m a chef, and cooking is my passion. When I’m not at work, I always order take-away food. I love pizza! Football is my favourite sport, but I don’t play it; I watch it on TV at the weekend. I have a big family, but I never see them because they are in Brazil. I miss them very much.", "questions": [{"type": "mcq", "text": "Who likes to cook at home?", "options": ["Maria", "Tom", "Aiko", "Luis"], "answer": "Maria", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Who doesn’t have a job?", "options": ["Maria", "Tom", "Aiko", "Luis"], "answer": "Aiko", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Who works in a school?", "options": ["Maria", "Tom", "Aiko", "Luis"], "answer": "Maria", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Who lives far from their family?", "options": ["Maria", "Tom", "Aiko", "Luis"], "answer": "Luis", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Who works in a hospital or with patients?", "options": ["Maria", "Tom", "Aiko", "Luis"], "answer": "Tom", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Who likes playing sports?", "options": ["Maria", "Tom", "Aiko", "Luis"], "answer": "Tom", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Who spends a lot of time alone?", "options": ["Maria", "Tom", "Aiko", "Luis"], "answer": "Aiko", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Who stays at home to watch TV at the weekend?", "options": ["Maria", "Tom", "Aiko", "Luis"], "answer": "Luis", "feedback": "Read the text carefully, then choose the best answer."}]}, "speaking": ["When were you born?", "What was your favourite subject at school?", "Who was your best friend?", "Were you quiet or noisy as a child?", "Name a famous person you like."], "listening": [{"title": "Exercise 1: Gemma Arterton", "audio": "CE L2 listening U09 EX.1 ( Audio).mp3", "script": "A short talk about Gemma Arterton: born in February 1986, liked Mickey Mouse, studied at RADA, appeared in Tess and Clash of the Titans.", "questions": [{"type": "match", "title": "Match the information with the answer", "left": ["Gemma Arterton was born", "Her favourite Disney character", "Gemma studied acting at", "In 2008, she appeared in", "One film she acted in during 2010"], "right": ["A. Mickey Mouse", "B. London", "C. February 1986", "D. RADA", "E. Tess", "F. Clash of the Titans", "G. Hannah"], "answer": ["C", "A", "D", "E", "F"]}]}, {"title": "Exercise 2: Nelson Mandela", "audio": "CE L2 Listening U09 EX.2 (Audio).mp3", "script": "A short talk about Nelson Mandela: born in Mvezo in 1918, close to family, became president and received the Nobel Peace Prize in 1993.", "questions": [{"type": "tf", "text": "Nelson Mandela was born in a small village called Mvezo.", "options": ["True", "False"], "answer": "True", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "He was not close to his family.", "options": ["True", "False"], "answer": "False", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "Nelson Mandela liked reading and listening to stories about his country.", "options": ["True", "False"], "answer": "True", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "Nelson Mandela became the first Black president of South Africa.", "options": ["True", "False"], "answer": "True", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "He received the Nobel Peace Prize in 1939.", "options": ["True", "False"], "answer": "False", "feedback": "Check the sentence in the audio."}, {"type": "order", "title": "Put Mandela's life events in order", "items": ["He received the Nobel Peace Prize.", "He was born in Mvezo.", "He became president.", "He worked as a lawyer and political leader."], "answer": [4, 1, 3, 2]}]}, {"title": "Exercise 3: Lily and Sam", "audio": "CE L2 Listening U09 EX.3 Audio.mp3", "script": "Lily asks Sam about his school life: favourite family member, best friends, subject, teacher and hobby.", "questions": [{"type": "match", "title": "Match the phrase with the correct answer", "left": ["Favorite family member", "Best friend in primary school", "Best friend in high school", "Favorite subject", "Favorite teacher", "Favorite hobby"], "right": ["A. Alex", "B. English", "C. Mrs. Green", "D. painting", "E. His older sister", "F. Mia", "G. Tom and Mark", "H. running", "I. Geography"], "answer": ["E", "A", "F", "I", "C", "D"]}]}]}, {"id": 10, "title": "Famous Lives", "focus": "past simple, life stories, creative jobs", "vocabulary": [], "vocabQuestions": [{"type": "mcq", "text": "1. Which phrase is a life event?", "options": dback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "18. Which word best completes: “He ____ a company in 1998.”", "options": ["created", "creator", "creative", "creation"], "answer": "created", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "19. Which adjective describes jobs like artist and inventor?", "options": ["expensive", "creative", "hungry", "thirsty"], "answer": "creative", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "20. Which word is a job?", "options": ["bus stop", "green tea", "principal dancer", "telephone number"], "answer": "principal dancer", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "21. Which phrase is about apology language?", "options": ["I’m sorry I’m late.", "I’m from Riyadh.", "I can swim.", "There is a café."], "answer": "I’m sorry I’m late.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "22. Which reply accepts thanks?", "options": ["You’re welcome.", "I’m twenty.", "It’s a bank.", "He is from Spain."], "answer": "You’re welcome.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "23. Which phrase is used in invitation replies?", "options": ["Sorry for not spelling earlier.", "Sorry for not cinema earlier.", "Sorry for not bank earlier.", "Sorry for not replying earlier."], "answer": "Sorry for not replying earlier.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "24. Which phrase is about a birthday party email?", "options": ["invite him to the occasion", "spell him to the bank", "cook him to the train", "drive him to surname"], "answer": "invite him to the occasion", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "25. Which one is a creative job?", "options": ["film director", "phone number", "city centre", "grandfather"], "answer": "film director", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "26. Which phrase is about fashion?", "options": ["teacher of water", "student of tea", "queen of fashion", "king of bus stops"], "answer": "queen of fashion", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "27. Which word means “well-known”?", "options": ["famous", "quiet", "empty", "thirsty"], "answer": "famous", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "28. Which phrase is about a person’s life story?", "options": ["shopping list", "bus timetable", "café menu", "biography"], "answer": "biography", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "29. Which verb is past simple?", "options": ["passed", "passing", "passes", "pass"], "answer": "passed", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "30. Which phrase belongs to Unit 10?", "options": ["life events", "prepositions of place", "food and drink", "numbers 0–20"], "answer": "life events", "feedback": "Think about the context, collocation, and unit vocabulary."}], "grammar": {"point": "past simple regular and irregular", "examples": ["He started Google.", "She won a prize.", "They didn't buy a house.", "Did he go to university?"], "questions": [{"type": "mcq", "text": "Complete: Larry Page ____ in the USA.", "options": ["borned", "did born", "was born", "were born"], "answer": "was born", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ computer science.", "options": ["study", "studies", "studying", "studied"], "answer": "studied", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ Google in 1998.", "options": ["creates", "creating", "created", "create"], "answer": "created", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Matisse ____ painting when he was 20.", "options": ["started", "start", "starts", "starting"], "answer": "started", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Darcey Bussell ____ in London.", "options": ["borned", "did born", "was born", "were born"], "answer": "was born", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Leonardo da Vinci ____ to Milan in 1482.", "options": ["moving", "moved", "move", "moves"], "answer": "moved", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ in France.", "options": ["die", "dies", "dying", "died"], "answer": "died", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct past form.", "options": ["winning", "won", "winned", "win"], "answer": "won", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ a prize for his music.", "options": ["winning", "won", "winned", "wins"], "answer": "won", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: She ____ as principal dancer.", "options": ["working", "worked", "work", "works"], "answer": "worked", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: In 2009, she ____ work on a TV show.", "options": ["start", "starts", "starting", "started"], "answer": "started", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct negative.", "options": ["He doesn’t studied medicine.", "He wasn’t study medicine.", "He didn’t study medicine.", "He didn’t studied medicine."], "answer": "He didn’t study medicine.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct question.", "options": ["Does he studied computer science?", "Was he study computer science?", "Did he study computer science?", "Did he studied computer science?"], "answer": "Did he study computer science?", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct short answer.", "options": ["Yes, he studied did.", "Yes, he did.", "Yes, he does.", "Yes, he was."], "answer": "Yes, he did.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Where ____ he study painting?", "options": ["does", "was", "were", "did"], "answer": "did", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: What ____ he create?", "options": ["did", "does", "was", "were"], "answer": "did", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: When ____ she start work on the TV show?", "options": ["did", "does", "was", "were"], "answer": "did", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct sentence.", "options": ["He moved to France and died there.", "He move to France and died there.", "He moved to France and die there.", "He did moved to France."], "answer": "He moved to France and died there.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ a multi-millionaire.", "options": ["became", "becomed", "becomes", "becoming"], "answer": "became", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ computers when he was a child.", "options": ["loving", "loved", "love", "loves"], "answer": "loved", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: She ____ in Australia in her early childhood.", "options": ["lives", "living", "lived", "live"], "answer": "lived", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I ____ my best friend at school.", "options": ["meeting", "met", "meet", "meeted"], "answer": "met", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: My parents ____ married in 1998.", "options": ["getting", "got", "get", "gets"], "answer": "got", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: He ____ his driving test last year.", "options": ["passed", "pass", "passes", "passing"], "answer": "passed", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Sorry, I ____ your email yesterday.", "options": ["don’t saw", "wasn’t see", "didn’t see", "didn’t saw"], "answer": "didn’t see", "feedback": "Review the unit language, then try again."}]}, "reading": {"text": "Reading – Online Shopping\n\nMy name is Sara, and I love shopping online. I prefer mobile apps, but sometimes I use my computer. The phone is better for me, and I can even do my shopping from bed! I love shopping so much that I buy everything I need at home. I get food, electronics, books, and even large pieces of furniture like my sofa and bookshelves all online. But I still prefer getting clothes from a store so I can try them on to be sure they fit me.\n\nYesterday, I bought a birthday present for my mother, and it arrived today! That saves me a lot of time. I am a very busy person, and I am a little forgetful too. If I think of something I need, then it is wonderful that I can buy it at that moment.\n\nMy friends aren’t comfortable with buying things online as I am because they think that it can be dangerous. Of course, buying some things can be dangerous. One still needs to buy paper, but I am very careful with information. I am sure that shopping online will still need to be used as it is easy. You can see an address has got an “s” in it, like https://. That “s” means it is safe.\n\nPeople should not be afraid of shopping online. I think it will be the only way we will do our shopping in the future!", "questions": [{"type": "mcq", "text": "Who is Sara’s favourite way of shopping?", "options": ["On her computer", "On her phone", "In a shop", "At the market"], "answer": "On her phone", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What doesn’t Sara buy online?", "options": ["Food", "Furniture", "Clothes", "Books"], "answer": "Clothes", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does “it” refer to in paragraph 3?", "options": ["Shopping online", "A present", "Her mother’s birthday", "Her phone"], "answer": "Shopping online", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Why doesn’t Sara think online shopping is good all the time?", "options": ["It saves time", "It is cheap", "It can be dangerous", "It is good quality"], "answer": "It can be dangerous", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What do Sara’s friends think of shopping online?", "options": ["It is always safe", "A lot of people will shop online", "It can be dangerous", "It is never useful"], "answer": "It can be dangerous", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does Sara think will happen in the future?", "options": ["Online shopping will be safer", "A lot of people will shop online", "Everybody will only shop online", "Nobody will shop online"], "answer": "Everybody will only shop online", "feedback": "Read the text carefully, then choose the best answer."}]}, "speaking": ["Tell me about a famous person.", "When was he/she born?", "What did he/she do?", "Why is he/she famous?", "What did he/she make or start?"], "listening": [{"title": "Exercise 1: Five Creative People", "audio": "CE L2 Listening U10 EX1 Audio.mp3", "script": "A narrato let currentUnit=1, currentSection='overview';

function el(id){return document.getElementById(id)}
function escapeHtml(s){return String(s ?? '').replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));}

function init(){
  const nav=el('unitNav');
  nav.innerHTML='';
  units.forEach(u=>{
    const b=document.createElement('button');
    b.textContent='Unit '+u.id;
    b.onclick=()=>{currentUnit=u.id; currentSection='overview'; render();}
    nav.appendChild(b);
  });
  render();
}

function renderStudentBox(){
  const name = localStorage.getItem('studentName') || '';
  const sid = localStorage.getItem('studentID') || '';
  return `<div class="student-box">
    <div>
      <label>Student Name</label>
      <input id="studentName" value="${escapeHtml(name)}" placeholder="Write your name" oninput="localStorage.setItem('studentName', this.value)">
    </div>
    <div>
      <label>Student ID</label>
      <input id="studentID" value="${escapeHtml(sid)}" placeholder="Write your ID" oninput="localStorage.setItem('studentID', this.value)">
    </div>
  </div>`;
}

function render(){
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active', units[i].id===currentUnit));
  const u=units.find(x=>x.id===currentUnit) || units[0];
  currentUnit = u.id;
  const sections=['overview','vocabulary','grammar','reading','listening','speaking'];
  let html=`<div class="page">
  ${renderStudentBox()}
  <div class="unit-title"><div class="badge">Unit ${u.id}</div><h1>${escapeHtml(u.title)}</h1></div>
  <div class="tabs">${sections.map(s=>`<button class="tab ${currentSection===s?'active':''}" onclick="currentSection='${s}';render()">${s[0].toUpperCase()+s.slice(1)}</button>`).join('')}</div>
  <div class="progress-actions">
    <button class="green" onclick="showProgress()">📊 Show My Progress</button>
    <button class="secondary" onclick="clearProgress()">Reset Progress</button>
  </div>
  <div id="progressPanel" class="progress-panel"></div>
  ${renderSection(u)}
  <div class="footer-note">Cutting Edge Starter A1 Practice • Badawy Rabie / Abul Ashbal</div>
  </div>`;
  el('app').innerHTML=html;
}

function renderSection(u){
  if(currentSection==='overview') return `<div class="grid">
    <div class="card pink"><h2>🎯 Unit Focus</h2><p style="font-size:20px">${escapeHtml(u.focus || '')}</p></div>
    <div class="card green"><h2>✅ Practice Included</h2><ul class="big"><li>Student Name + ID boxes</li><li>Progress tracker</li><li>Vocabulary questions</li><li>Grammar questions</li><li>Reading questions</li><li>Listening practice</li><li>Speaking cue card</li></ul></div>
    <div class="card amber"><h2>🔒 Answer Rule</h2><p class="lock-note">Trainees cannot see answers before clicking Submit.</p></div>
  </div>`;
  if(currentSection==='vocabulary') return `<h2>📚 Vocabulary Practice</h2>
    <div class="card amber"><h3>Exam-style vocabulary practice</h3><p class="lock-note">Choose the best answer. Vocabulary lists are removed in this version.</p></div>
    ${renderQuiz(`vocab-${u.id}`, u.vocabQuestions || [], 'Submit Vocabulary Answers')}`;
  if(currentSection==='grammar') return `<h2>🧩 Grammar Practice</h2>
    <div class="card purple"><h3>${escapeHtml(u.grammar?.point || 'Grammar')}</h3><ul class="big">${(u.grammar?.examples || []).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul></div>
    ${renderQuiz(`grammar-${u.id}`, u.grammar?.questions || [], 'Submit Grammar Answers')}`;
  if(currentSection==='reading') return `<h2>📖 Reading Practice</h2>
    <div class="card green"><h3>Read the text</h3><p style="font-size:21px;line-height:1.6;white-space:pre-wrap">${escapeHtml(u.reading?.text || '')}</p></div>
    ${renderQuiz(`reading-${u.id}`, u.reading?.questions || [], 'Submit Reading Answers')}`;
  if(currentSection==='listening') return `<h2>🎧 Listening Practice</h2>
    <p class="lock-note">Listen first. The script and answers unlock only after you submit.</p>
    ${(u.listening || []).length ? u.listening.map((ex,i)=>renderListening(u.id, i, ex)).join('') : '<div class="card">No listening task in this unit.</div>'}`;
  if(currentSection==='speaking') return `<h2>🗣️ Speaking Cue Card</h2>
    <div class="speaking-card"><h3>Ask and answer. Record yourself if your teacher asks.</h3>${(u.speaking || []).map((p,i)=>`<div class="cue">${i+1}. ${escapeHtml(p)}</div>`).join('')}</div>`;
}

function renderQuiz(qid, questions, btnText){
  if(!questions.length) return '<div class="card">No questions in this section yet.</div>';
  return `<div class="quiz" id="${qid}">${questions.map((q,i)=>renderQuestion(qid,q,i)).join('')}
    <button class="green" onclick="submitQuiz('${qid}')">${btnText}</button>
    <button class="secondary" onclick="resetQuiz('${qid}')">Try Again</button>
    <div class="result" id="${qid}-result"></div>
    <div class="answers" id="${qid}-answers"></div>
  </div>`;
}

function renderListening(uid, idx, ex){
  const qid=`listen-${uid}-${idx}`;
  const audio = ex.audio || '';
  return `<div class="audio-card">
    <h3>🎧 ${escapeHtml(ex.title || ('Exercise '+(idx+1)))}</h3>
    ${audio ? `<audio controls preload="metadata"><source src="audio/${encodeURIComponent(audio)}" type="audio/mpeg">Your browser cannot play this audio.</audio>` : ''}
    <p><b>Instruction:</b> Listen two times. Then answer the questions below.</p>
    ${renderQuiz(qid, ex.questions || [], 'Submit Listening Answers')}
    <button class="gray" id="${qid}-scriptBtn" style="display:none" onclick="toggleScript('${qid}')">Show / Hide Script</button>
    <div class="script" id="${qid}-script">${escapeHtml(ex.script || '')}</div>
  </div>`;
}

function renderQuestion(qid,q,i){
  if(q.type==='mcq' || q.type==='tf'){
    return `<div class="q" data-type="${q.type}" data-answer="${escapeHtml(q.answer)}"><div class="q-title">${escapeHtml(q.text)}</div>${(q.options || []).map(opt=>`<label class="option"><input type="radio" name="${qid}-${i}" value="${escapeHtml(opt)}"> ${escapeHtml(opt)}</label>`).join('')}</div>`;
  }
  if(q.type==='match'){
    const ans = JSON.stringify(q.answer || []);
    return `<div class="q" data-type="match" data-answer="${escapeHtml(ans)}"><div class="q-title">${escapeHtml(q.title || 'Match')}</div><div class="grid"><div>${(q.left || []).map((l,k)=>`<p><b>${k+1}.</b> ${escapeHtml(l)} <select name="${qid}-${i}-${k}"><option value="">Choose</option>${(q.right || []).map(r=>`<option value="${escapeHtml(String(r)[0])}">${escapeHtml(r)}</option>`).join('')}</select></p>`).join('')}</div><div>${(q.right || []).map(r=>`<p>${escapeHtml(r)}</p>`).join('')}</div></div></div>`;
  }
  if(q.type==='order'){
    const ans = JSON.stringify(q.answer || []);
    return `<div class="q" data-type="order" data-answer="${escapeHtml(ans)}"><div class="q-title">${escapeHtml(q.title || 'Order')}</div>${(q.items || []).map((it,k)=>`<p><input type="number" min="1" max="${q.items.length}" name="${qid}-${i}-${k}" placeholder="#"> ${escapeHtml(it)}</p>`).join('')}</div>`;
  }
  return `<div class="q" data-type="mcq" data-answer="${escapeHtml(q.answer || '')}"><div class="q-title">${escapeHtml(q.text || '')}</div></div>`;
}

function getSectionLabel(qid){
  if(qid.startsWith('vocab-')) return 'Vocabulary';
  if(qid.startsWith('grammar-')) return 'Grammar';
  if(qid.startsWith('reading-')) return 'Reading';
  if(qid.startsWith('listen-')) return 'Listening';
  return currentSection ? currentSection[0].toUpperCase() + currentSection.slice(1) : 'Practice';
}

function saveProgress(qid, score, total){
  const progress = JSON.parse(localStorage.getItem('practiceProgress') || '{}');
  const u = units.find(x => x.id === currentUnit) || {id: currentUnit, title: ''};
  progress[qid] = {
    unit: u.id,
    unitTitle: u.title,
    section: getSectionLabel(qid),
    score: score,
    total: total,
    percent: total ? Math.round((score / total) * 100) : 0,
    date: new Date().toLocaleString(),
    studentName: localStorage.getItem('studentName') || '',
    studentID: localStorage.getItem('studentID') || ''
  };
  localStorage.setItem('practiceProgress', JSON.stringify(progress));
}

function submitQuiz(qid){
  const box=document.getElementById(qid);
  if(!box) return;
  const qs=[...box.querySelectorAll(':scope > .q')];
  let score=0, total=0, answerHtml='<h3>Answer Key</h3><ol>';
  qs.forEach((q,qi)=>{
    const type=q.dataset.type;
    if(type==='mcq' || type==='tf'){
      total++;
      const ans=q.dataset.answer;
      const chosen=q.querySelector('input:checked')?.value || '';
      if(chosen===ans){score++; q.style.borderColor='#22c55e';} else {q.style.borderColor='#ef4444';}
      answerHtml+=`<li>${escapeHtml(ans)}</li>`;
    }else if(type==='match'){
      const ans=JSON.parse(q.dataset.answer || '[]');
      ans.forEach((a,k)=>{
        total++;
        const chosen=q.querySelector(`select[name="${qid}-${qi}-${k}"]`)?.value || '';
        if(chosen===a) score++;
      });
      answerHtml+=`<li>${ans.map((a,k)=>`${k+1}-${a}`).join(', ')}</li>`;
      q.style.borderColor='#22c55e';
    }else if(type==='order'){
      const ans=JSON.parse(q.dataset.answer || '[]');
      ans.forEach((a,k)=>{
        total++;
        const chosen=q.querySelector(`input[name="${qid}-${qi}-${k}"]`)?.value || '';
        if(String(chosen)===String(a)) score++;
      });
      answerHtml+=`<li>${ans.map((a,k)=>`${k+1}→${a}`).join(', ')}</li>`;
      q.style.borderColor='#22c55e';
    }
  });
  answerHtml+='</ol><p><b>Feedback:</b> Review the key words and try again.</p>';
  const res=document.getElementById(`${qid}-result`);
  const ans=document.getElementById(`${qid}-answers`);
  res.innerHTML=`Your score: ${score} / ${total}`;
  res.style.display='block';
  ans.innerHTML=answerHtml;
  ans.style.display='block';
  saveProgress(qid, score, total);
  const sb=document.getElementById(`${qid}-scriptBtn`);
  if(sb) sb.style.display='inline-block';
}

function resetQuiz(qid){
  const box=document.getElementById(qid);
  if(!box) return;
  box.querySelectorAll('input[type=radio]').forEach(x=>x.checked=false);
  box.querySelectorAll('select').forEach(x=>x.value='');
  box.querySelectorAll('input[type=number]').forEach(x=>x.value='');
  box.querySelectorAll('.q').forEach(q=>q.style.borderColor='#e5e7eb');
  const r=document.getElementById(`${qid}-result`);
  const a=document.getElementById(`${qid}-answers`);
  if(r) r.style.display='none';
  if(a) a.style.display='none';
  const sb=document.getElementById(`${qid}-scriptBtn`);
  const sc=document.getElementById(`${qid}-script`);
  if(sb) sb.style.display='none';
  if(sc) sc.style.display='none';
}

function toggleScript(qid){
  const sc=document.getElementById(`${qid}-script`);
  if(sc) sc.style.display = sc.style.display==='block' ? 'none' : 'block';
}

function showProgress(){
  const panel = document.getElementById('progressPanel');
  const progress = JSON.parse(localStorage.getItem('practiceProgress') || '{}');
  const rows = Object.values(progress).sort((a,b)=> (a.unit-b.unit) || a.section.localeCompare(b.section));
  const name = localStorage.getItem('studentName') || 'Not written';
  const sid = localStorage.getItem('studentID') || 'Not written';

  if(!rows.length){
    panel.style.display = 'block';
    panel.innerHTML = `<h2>📊 My Progress</h2><p><b>Name:</b> ${escapeHtml(name)} &nbsp; <b>ID:</b> ${escapeHtml(sid)}</p><div class="lock-note">No submitted quizzes yet.</div>`;
    return;
  }

  let totalScore = rows.reduce((sum,r)=>sum+r.score,0);
  let totalMarks = rows.reduce((sum,r)=>sum+r.total,0);
  let overall = totalMarks ? Math.round((totalScore/totalMarks)*100) : 0;

  panel.style.display = 'block';
  panel.innerHTML = `<h2>📊 My Progress</h2>
    <p><b>Name:</b> ${escapeHtml(name)} &nbsp; <b>ID:</b> ${escapeHtml(sid)}</p>
    <div class="progress-summary">
      <div><b>Completed:</b> ${rows.length} quizzes</div>
      <div><b>Total Score:</b> ${totalScore} / ${totalMarks}</div>
      <div><b>Overall:</b> ${overall}%</div>
    </div>
    <table class="progress-table">
      <thead><tr><th>Unit</th><th>Section</th><th>Score</th><th>%</th><th>Last Submit</th></tr></thead>
      <tbody>${rows.map(r=>`<tr><td>Unit ${r.unit}</td><td>${escapeHtml(r.section)}</td><td>${r.score} / ${r.total}</td><td>${r.percent}%</td><td>${escapeHtml(r.date)}</td></tr>`).join('')}</tbody>
    </table>`;
}

function clearProgress(){
  if(confirm('Clear all saved progress on this device?')){
    localStorage.removeItem('practiceProgress');
    const panel = document.getElementById('progressPanel');
    if(panel){
      panel.style.display = 'block';
      panel.innerHTML = '<div class="lock-note">Progress reset. Submit a quiz to start again.</div>';
    }
  }
}

function nextUnit(){ if(currentUnit < Math.max(...units.map(u=>u.id))){ const ids=units.map(u=>u.id); const i=ids.indexOf(currentUnit); currentUnit=ids[Math.min(i+1,ids.length-1)]; currentSection='overview'; render(); } }
function prevUnit(){ if(currentUnit > Math.min(...units.map(u=>u.id))){ const ids=units.map(u=>u.id); const i=ids.indexOf(currentUnit); currentUnit=ids[Math.max(i-1,0)]; currentSection='overview'; render(); } }

window.onload=init;
</script>
