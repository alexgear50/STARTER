<!doctype html>
<html lang="en">
<head>

<title>CE Starter A1 Practice - Badawy Rabie</title>

<style>
:root {
  --blue:#2563eb; --pink:#db2777; --green:#16a34a; --amber:#f59e0b; --purple:#7c3aed;
  --bg:#f7fbff; --ink:#172554; --card:#ffffff;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#eff6ff,#fff7ed);color:var(--ink);}
header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:4px solid #fde68a;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:12px 18px;flex-wrap:wrap}
.brand{font-weight:900;font-size:clamp(18px,3vw,30px);color:#1d4ed8}
.creator{font-size:14px;color:#7c2d12;font-weight:700}
button,.btn{border:0;background:#2563eb;color:#fff;border-radius:14px;padding:10px 14px;font-weight:800;cursor:pointer;box-shadow:0 3px 0 #1e40af}
button:hover{filter:brightness(1.05)}
button.secondary{background:#db2777;box-shadow:0 3px 0 #9d174d}
button.green{background:#16a34a;box-shadow:0 3px 0 #166534}
button.gray{background:#475569;box-shadow:0 3px 0 #334155}
nav{display:flex;gap:6px;overflow:auto;padding:8px 12px;background:#fffbe8}
nav button{min-width:74px;padding:8px 10px;border-radius:12px;background:#f97316;box-shadow:0 3px 0 #c2410c}
nav button.active{background:#16a34a;box-shadow:0 3px 0 #166534}
main{max-width:1180px;margin:0 auto;padding:18px}
.page{background:rgba(255,255,255,.95);border:3px solid #bfdbfe;border-radius:28px;box-shadow:0 12px 30px rgba(37,99,235,.15);padding:18px;margin-bottom:28px;min-height:70vh}
.student-box{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;background:#ecfdf5;border:3px solid #22c55e;border-radius:20px;padding:14px;margin:0 0 16px 0}
.student-box label{display:block;font-weight:900;color:#166534;margin-bottom:6px}
.student-box input{width:100%;border:2px solid #86efac;border-radius:12px;padding:12px;font-size:17px;background:white}
.unit-title{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:3px dashed #93c5fd;padding-bottom:12px}
.badge{font-size:26px;font-weight:900;background:#fde68a;color:#92400e;border-radius:18px;padding:10px 16px;border:3px solid #f59e0b}
h1{margin:8px 0;font-size:clamp(26px,5vw,44px);color:#db2777}
h2{font-size:28px;color:#1d4ed8;margin:20px 0 10px}
h3{font-size:22px;color:#166534;margin:16px 0 8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.card{background:#fff;border:3px solid #e0e7ff;border-radius:22px;padding:16px;box-shadow:0 6px 14px rgba(0,0,0,.06)}
.card.pink{border-color:#fbcfe8}.card.green{border-color:#bbf7d0}.card.amber{border-color:#fde68a}.card.purple{border-color:#ddd6fe}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.tab{background:#e0e7ff;color:#1e3a8a;box-shadow:none;border:2px solid #93c5fd}
.tab.active{background:#2563eb;color:white}
ul.big li{margin:8px 0;font-size:18px}
.vocab-table{width:100%;border-collapse:separate;border-spacing:0 6px}
.vocab-table td,.vocab-table th{background:#f8fafc;padding:10px;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0}
.vocab-table th{background:#dbeafe;color:#1e3a8a}
.quiz{margin-top:12px}
.q{padding:14px;border:2px solid #e5e7eb;border-radius:16px;margin:10px 0;background:#fff}
.q-title{font-weight:800;margin-bottom:8px;color:#111827}
.option{display:block;margin:7px 0;padding:9px 10px;border:2px solid #e5e7eb;border-radius:12px;background:#f9fafb}
.option input{margin-right:8px}
select,input[type=number]{padding:8px;border:2px solid #93c5fd;border-radius:10px;margin:5px;min-width:90px}
.audio-card{border:4px solid #a7f3d0;background:#f0fdf4;border-radius:26px;margin:18px 0;padding:16px}
audio{width:100%;margin:8px 0}
.result{display:none;margin-top:12px;padding:14px;border-radius:16px;background:#ecfdf5;border:3px solid #22c55e;font-weight:800}
.answers{display:none;margin-top:12px;padding:12px;background:#fff7ed;border:2px dashed #f97316;border-radius:14px}
.script{display:none;white-space:pre-wrap;background:#f8fafc;border:2px solid #cbd5e1;border-radius:14px;padding:12px;margin-top:10px;line-height:1.5}
.lock-note{font-weight:700;color:#9d174d;background:#fce7f3;padding:10px;border-radius:12px;border:2px solid #f9a8d4;margin:8px 0}
.speaking-card{background:linear-gradient(135deg,#fef3c7,#dbeafe);border:4px solid #f59e0b;border-radius:28px;padding:18px}
.cue{font-size:20px;font-weight:800;margin:12px 0;padding:12px;background:#fff;border-radius:16px;border:2px solid #93c5fd}
.footer-note{text-align:center;font-weight:900;color:#7c3aed;margin:20px 0;font-size:20px}
.progress-actions{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 16px}
.progress-panel{display:none;background:#f8fafc;border:3px solid #93c5fd;border-radius:20px;padding:15px;margin:12px 0 18px}
.progress-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;background:#ecfdf5;border:2px solid #86efac;border-radius:14px;padding:12px;margin:10px 0;font-size:18px}
.progress-table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}
.progress-table th,.progress-table td{border:1px solid #dbeafe;padding:10px;text-align:left}
.progress-table th{background:#dbeafe;color:#1e3a8a}
@media (max-width:700px){.topbar{align-items:flex-start}main{padding:10px}.page{padding:12px;border-radius:18px}h1{font-size:28px} h2{font-size:24px}.card{padding:12px}.progress-table{font-size:13px}.progress-table th,.progress-table td{padding:7px}}
@media print{header, nav, .tabs, button, audio{display:none!important}.page{box-shadow:none;border:1px solid #ccc;page-break-after:always}.script,.answers,.result{display:block!important}}
</style>
</head>

<script>
const units = [{"id": 1, "title": "First Meetings", "focus": "name, spelling, phone numbers, jobs", "vocabulary": [], "vocabQuestions": [{"type": "mcq", "text": "1. In the form, Faisal writes: First name: Faisal / Surname: Al-Harbi. What should he write in the box “surname”?", "options": ["teacher", "Al-Harbi", "Faisal", "Saudi"], "answer": "Al-Harbi", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "2. Which answer gives personal information correctly?", "options": ["My phone number is engineer.", "My phone number is Ahmed.", "My phone number is Riyadh.", "My phone number is 055 812 9043."], "answer": "My phone number is 055 812 9043.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "3. A trainee says “A-L-I.” Which question did the teacher probably ask?", "options": ["What’s your phone number?", "How do you spell your name?", "What’s your job?", "Where are you from?"], "answer": "How do you spell your name?", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "4. Which line is suitable for an English class introduction?", "options": ["Goodbye, phone number, engineer.", "Book page teacher hello.", "My job’s page five.", "Hello, my name’s Sami. Nice to meet you."], "answer": "Hello, my name’s Sami. Nice to meet you.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "5. Which pair matches correctly?", "options": ["phone number → teacher", "surname → 055", "first name → Al-Otaibi", "job → engineer"], "answer": "job → engineer", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "6. Which phrase is used when you meet someone for the first time?", "options": ["See you yesterday.", "Write your number.", "Turn right.", "Nice to meet you."], "answer": "Nice to meet you.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "7. In “sara22@tmail.com”, what is “@” used for?", "options": ["an email address", "a phone number", "a job", "a surname"], "answer": "an email address", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "8. Which item is NOT usually written in a personal information form?", "options": ["surname", "phone number", "favourite restaurant", "first name"], "answer": "favourite restaurant", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "9. Which spelling is correct for the Saudi name “Huda”?", "options": ["H-D-U-A", "H-U-D-A", "H-A-D-U", "H-U-A-D"], "answer": "H-U-D-A", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "10. Which answer fits: “Are you Nasser Al-Qahtani?”", "options": ["Twenty, please.", "Yes, that’s right.", "I’m a page.", "It’s an email."], "answer": "Yes, that’s right.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "11. Which word completes the conversation: A: What’s your ____? B: I’m a student.", "options": ["page", "job", "surname", "phone number"], "answer": "job", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "12. Which word is different from the others?", "options": ["accountant", "zero", "twelve", "twenty"], "answer": "accountant", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "13. Which sentence uses “email address” naturally?", "options": ["My email address is ali15@newmail.com.", "My email address is Saudi Arabia.", "My email address is accountant.", "My email address is page six."], "answer": "My email address is ali15@newmail.com.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "14. In “My first name is Omar,” the word “first” means ____.", "options": ["family name", "job title", "phone code", "given name"], "answer": "given name", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "15. Which response is wrong for “What’s your name?”", "options": ["I’m Fahad.", "My first name’s Ali.", "I’m an engineer.", "My name’s Ahmed."], "answer": "I’m an engineer.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "16. Which phrase belongs to classroom language?", "options": ["Catch the bus stop.", "Go to the beach.", "Open your book to page six.", "Order black coffee."], "answer": "Open your book to page six.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "17. Which number is usually part of a phone number?", "options": ["zero", "teacher", "surname", "student"], "answer": "zero", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "18. Which answer is best for “What’s your job?”", "options": ["My name is police.", "I’m 055.", "It’s Al-Harbi.", "I’m a police officer."], "answer": "I’m a police officer.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "19. Which pair uses a/an correctly?", "options": ["an engineer", "a accountant", "an teacher", "an student"], "answer": "an engineer", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "20. Which job can use “a” correctly?", "options": ["an waiter", "an police officer", "an teacher", "a shop assistant"], "answer": "a shop assistant", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "21. Which line has only jobs?", "options": ["name, surname, email", "actor, engineer, teacher", "Jeddah, Dammam, Riyadh", "zero, one, two"], "answer": "actor, engineer, teacher", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "22. Which phrase is the opposite of “goodbye” in a first meeting?", "options": ["page", "hello", "surname", "number"], "answer": "hello", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "23. Which number is written correctly?", "options": ["twelv", "twelev", "twelve", "twelf"], "answer": "twelve", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "24. Which number comes between fourteen and sixteen?", "options": ["twelve", "fifteen", "thirteen", "seventeen"], "answer": "fifteen", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "25. Which item can include letters, numbers, @ and dot?", "options": ["job", "first name", "nationality", "email address"], "answer": "email address", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "26. Which answer is a surname in Saudi context?", "options": ["055", "teacher", "Al-Shehri", "Fahad"], "answer": "Al-Shehri", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "27. The teacher asks “How do you spell Dammam?” Which answer is correct?", "options": ["D-M-A-M-A-M", "D-A-M-A-M", "D-A-M-M-M-A", "D-A-M-M-A-M"], "answer": "D-A-M-M-A-M", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "28. Which sentence is NOT personal information?", "options": ["My phone number is 050...", "My job is trainee.", "The café is near the hotel.", "I’m from Hofuf."], "answer": "The café is near the hotel.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "29. Which phrase is formal enough for class?", "options": ["Phone Abdullah good.", "Job name book.", "Good morning. My name is Abdullah.", "Yo, name Abdullah."], "answer": "Good morning. My name is Abdullah.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "30. Which answer fits “What’s your surname?”", "options": ["Al-Mutairi", "Yousef", "055 123 6789", "I’m a trainee."], "answer": "Al-Mutairi", "feedback": "Think about the context, collocation, and unit vocabulary."}], "grammar": {"point": "be: I am / you are", "examples": ["I am Omar.", "Are you Sara?", "My name is Ali.", "What is your phone number?"], "questions": [{"type": "mcq", "text": "1. ___ name is Omar.", "options": ["My", "I", "You", "He"], "answer": "My", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "2. Are ___ Sara?", "options": ["you", "I", "he", "she"], "answer": "you", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "3. I ___ a student.", "options": ["am", "is", "are", "be"], "answer": "am", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "4. What ___ your name?", "options": ["is", "are", "am", "be"], "answer": "is", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "5. My phone number ___ 0551234567.", "options": ["is", "are", "am", "be"], "answer": "is", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "6. Nice ___ meet you.", "options": ["to", "in", "at", "on"], "answer": "to", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "7. How do you ___ your name?", "options": ["spell", "number", "job", "meet"], "answer": "spell", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "8. ___ you an engineer?", "options": ["Are", "Is", "Am", "Be"], "answer": "Are", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "9. No, I ___ not.", "options": ["am", "is", "are", "be"], "answer": "am", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "10. He ___ a teacher.", "options": ["is", "are", "am", "be"], "answer": "is", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "11. ___ name is Omar.", "options": ["My", "I", "You", "He"], "answer": "My", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "12. Are ___ Sara?", "options": ["you", "I", "he", "she"], "answer": "you", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "13. I ___ a student.", "options": ["am", "is", "are", "be"], "answer": "am", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "14. What ___ your name?", "options": ["is", "are", "am", "be"], "answer": "is", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "15. My phone number ___ 0551234567.", "options": ["is", "are", "am", "be"], "answer": "is", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "16. Nice ___ meet you.", "options": ["to", "in", "at", "on"], "answer": "to", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "17. How do you ___ your name?", "options": ["spell", "number", "job", "meet"], "answer": "spell", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "18. ___ you an engineer?", "options": ["Are", "Is", "Am", "Be"], "answer": "Are", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "19. No, I ___ not.", "options": ["am", "is", "are", "be"], "answer": "am", "feedback": "Grammar point: be: I am / you are"}, {"type": "mcq", "text": "20. He ___ a teacher.", "options": ["is", "are", "am", "be"], "answer": "is", "feedback": "Grammar point: be: I am / you are"}]}, "reading": {"text": "Omar is a new trainee in Dammam. He meets Faisal in his English class. Omar says, 'Hello, my name is Omar.' Faisal says, 'Nice to meet you.' Omar spells his name O-M-A-R. He gives his phone number to the class group. Their teacher asks them to open the book to page five.", "questions": [{"type": "mcq", "text": "1. Where is Omar?", "options": ["in English class", "at the airport", "in a restaurant", "at home"], "answer": "in English class", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "2. Who does Omar meet?", "options": ["Faisal", "Khalid", "Noura", "Huda"], "answer": "Faisal", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "3. How does Omar spell his name?", "options": ["O-M-A-R", "A-M-A-R", "O-M-E-R", "O-M-A-L"], "answer": "O-M-A-R", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "4. What does he give?", "options": ["his phone number", "his car", "his lunch", "his book"], "answer": "his phone number", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "5. What page do they open?", "options": ["five", "ten", "one", "twelve"], "answer": "five", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "6. Where is Omar?", "options": ["in English class", "at the airport", "in a restaurant", "at home"], "answer": "in English class", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "7. Who does Omar meet?", "options": ["Faisal", "Khalid", "Noura", "Huda"], "answer": "Faisal", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "8. How does Omar spell his name?", "options": ["O-M-A-R", "A-M-A-R", "O-M-E-R", "O-M-A-L"], "answer": "O-M-A-R", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "9. What does he give?", "options": ["his phone number", "his car", "his lunch", "his book"], "answer": "his phone number", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "10. What page do they open?", "options": ["five", "ten", "one", "twelve"], "answer": "five", "feedback": "Read the text again and find the key words."}]}, "speaking": ["What is your name?", "How do you spell your name?", "Where are you from?", "What is your phone number?", "What is your job?"], "listening": [{"title": "Exercise 1: First Meetings", "audio": "CE_L2_Listening (U01) EX.1.mp3", "script": "Anna meets Leo in a new English class. They ask names, spell names, talk about where they are from, and exchange a phone number.", "questions": [{"type": "match", "title": "Match the phrases with the best response", "left": ["Hello!", "What’s your name?", "Nice to meet you.", "How do you spell that?", "Where are you from?"], "right": ["A. I’m from Mexico.", "B. My name is Sam.", "C. Good morning.", "D. I’m 25 years old.", "E. Hi!", "F. L-I-S-A.", "G. Nice to meet you too.", "H. Yes, I am"], "answer": ["E", "B", "G", "F", "A"]}, {"type": "order", "title": "Put the events in order", "items": ["Anna gives her phone number.", "Leo spells his name.", "They say 'Nice to meet you.'", "Anna asks 'How do you spell your name?'", "The teacher says to begin class."], "answer": [4, 3, 1, 2, 5]}, {"type": "mcq", "text": "Where does the conversation take place?", "options": ["In a café", "At a bus stop", "In a classroom", "On the phone"], "answer": "In a classroom", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "Where is Anna from?", "options": ["Toronto", "São Paulo", "Mexico City", "London"], "answer": "São Paulo", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "What does Anna ask Leo to spell?", "options": ["Toronto", "Brazil", "His name", "Her name"], "answer": "His name", "feedback": "Listen again and check the key words."}]}, {"title": "Exercise 2: Meeting Someone New", "audio": "CE L2 Listening U01 EX.2 MP3.mp3", "script": "Sara and Tom meet. Tom spells his surname Parker, gives his email, says he is 38, and talks about his job and hobbies.", "questions": [{"type": "mcq", "text": "What is the man’s name?", "options": ["Tom Parker", "Tom Barker", "Tony Parker"], "answer": "Tom Parker", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "How old is Tom?", "options": ["36", "38", "40"], "answer": "38", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "What is Sara’s job?", "options": ["Accountant", "Teacher", "Shop assistant"], "answer": "Shop assistant", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "Where does Tom work?", "options": ["In a shop in Toronto", "At Emar Company in California", "In a school in California"], "answer": "At Emar Company in California", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "What is Tom’s hobby?", "options": ["Playing video games", "Reading and playing football", "Watching TV"], "answer": "Reading and playing football", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "What does Sara like to do?", "options": ["Reading books", "Playing football", "Playing video games"], "answer": "Playing video games", "feedback": "Listen again and check the key words."}]}]}, {"id": 2, "title": "At the Store", "focus": "numbers 21-100, shopping, office items", "vocabulary": [], "vocabQuestions": [{"type": "mcq", "text": "1. A trainee needs to write notes during training. Which two items are most useful?", "options": ["a beach and a mountain", "a sandwich and coffee", "a pen and a notebook", "a café and a bank"], "answer": "a pen and a notebook", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "2. “One hundred sheets of paper” means ____.", "options": ["100 pieces of paper", "10 pens", "one notebook", "a yellow pack"], "answer": "100 pieces of paper", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "3. Which word best completes: “Do you want the small notebooks or the ____ ones?”", "options": ["paper", "big", "black", "thirty"], "answer": "big", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "4. Which phrase is natural in a shop?", "options": ["Can I have thirty black pens, please?", "Can I spell thirty black pens?", "Can I live thirty black pens?", "Can I meet thirty black pens?"], "answer": "Can I have thirty black pens, please?", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "5. If the assistant says “Anything else?”, he is asking if you want ____.", "options": ["your nationality", "your job", "more things", "your surname"], "answer": "more things", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "6. Which item is usually yellow and used for short reminders?", "options": ["sticky notes", "printer paper", "black pens", "large notebooks"], "answer": "sticky notes", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "7. Which phrase gives a quantity correctly?", "options": ["twenty-small five notebooks", "twenty-five small notebooks", "small twenty-five notebooks", "notebooks twenty-five small"], "answer": "twenty-five small notebooks", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "8. Which item is sold in sheets?", "options": ["paper", "pen", "office", "customer"], "answer": "paper", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "9. Which number is the same as 30?", "options": ["thirty", "thirteen", "three", "fifty"], "answer": "thirty", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "10. Which word is NOT an office item?", "options": ["restaurant", "pen", "notebook", "paper"], "answer": "restaurant", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "11. Which answer best completes: “I need these things ____ my office.”", "options": ["at", "for", "to", "on"], "answer": "for", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "12. A shop assistant asks: “Small or big?” What is he asking about?", "options": ["nationality", "job", "size", "price only"], "answer": "size", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "13. Which group contains only colours?", "options": ["thirty, twenty, one", "pen, paper, notebook", "store, office, assistant", "black, white, yellow"], "answer": "black, white, yellow", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "14. In a store, “I’ll take it” means ____.", "options": ["I will teach it", "I will buy it", "I will spell it", "I will open it"], "answer": "I will buy it", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "15. Which sentence is a complete shop request?", "options": ["I need one pack of yellow sticky notes.", "I need yellow.", "Pack sticky one need.", "I need office black."], "answer": "I need one pack of yellow sticky notes.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "16. Which question checks quantity?", "options": ["Are you Saudi?", "How many notebooks do you need?", "What’s your surname?", "Where is the hotel?"], "answer": "How many notebooks do you need?", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "17. Which item is countable in the phrase “thirty black ___”?", "options": ["water", "coffee", "pens", "paper"], "answer": "pens", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "18. Which phrase is NOT natural?", "options": ["one hundred pen", "one hundred sheets", "thirty pens", "twenty-five notebooks"], "answer": "one hundred pen", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "19. Which word completes the shop conversation: A: Can I help you? B: Yes, I ____ some paper.", "options": ["meet", "am", "need", "spell"], "answer": "need", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "20. Which item would you probably buy from a stationery store?", "options": ["notebook", "hotel room", "chicken rice", "train ticket"], "answer": "notebook", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "21. “Customer” refers to the person who ____.", "options": ["teaches English", "drives a bus", "buys something", "serves in a café"], "answer": "buys something", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "22. “Assistant” in a shop is the person who ____.", "options": ["studies geography", "helps customers", "writes homework", "visits a beach"], "answer": "helps customers", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "23. Which sentence uses “paper” naturally?", "options": ["I need a paper of notebooks.", "I need one hundred sheets of paper.", "I need one hundred papers of sheets.", "I need paper one hundred sheet."], "answer": "I need one hundred sheets of paper.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "24. Which word is closest to “store”?", "options": ["shop", "school", "office worker", "email"], "answer": "shop", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "25. Which phrase shows a polite request?", "options": ["Give sticky notes now.", "I want, you give.", "Sticky notes me.", "Can I have a pack of sticky notes, please?"], "answer": "Can I have a pack of sticky notes, please?", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "26. Which item can be black, blue, or red?", "options": ["paper sheet", "office", "customer", "pen"], "answer": "pen", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "27. Which phrase is suitable for an exam form about numbers?", "options": ["Write 25 in jobs: teacher.", "Write 25 in places: bank.", "Write 25 in food: rice.", "Write 25 in words: twenty-five."], "answer": "Write 25 in words: twenty-five.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "28. Which answer fits “How many sheets do you want?”", "options": ["Small.", "At the office.", "One hundred.", "Black."], "answer": "One hundred.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "29. Which word means “not large”?", "options": ["small", "black", "yellow", "office"], "answer": "small", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "30. Which phrase is best after buying something?", "options": ["I’m from Jeddah.", "My job is accountant.", "Thank you. Goodbye.", "How do you spell Riyadh?"], "answer": "Thank you. Goodbye.", "feedback": "Think about the context, collocation, and unit vocabulary."}], "grammar": {"point": "be questions + numbers", "examples": ["Do you need thirty pens?", "I need twenty-five notebooks.", "It is one hundred sheets.", "Are they small?"], "questions": [{"type": "mcq", "text": "1. I need ___ pens.", "options": ["thirty", "thirteen", "three", "thirsty"], "answer": "thirty", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "2. Do you have notebooks? Yes, we ___.", "options": ["do", "does", "are", "is"], "answer": "do", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "3. ___ many sheets?", "options": ["How", "What", "Where", "Who"], "answer": "How", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "4. I would like twenty-___ notebooks.", "options": ["five", "fifth", "fifteen", "fifty"], "answer": "five", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "5. One ___ sheets, please.", "options": ["hundred", "hundreds", "hungry", "hand"], "answer": "hundred", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "6. Big or ___?", "options": ["small", "black", "write", "paper"], "answer": "small", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "7. Is that ___?", "options": ["all", "some", "any", "one"], "answer": "all", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "8. I'll ___ one pack.", "options": ["take", "need", "be", "go"], "answer": "take", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "9. The pens are ___.", "options": ["black", "thirty", "office", "paper"], "answer": "black", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "10. I need some things ___ my office.", "options": ["for", "on", "at", "in"], "answer": "for", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "11. I need ___ pens.", "options": ["thirty", "thirteen", "three", "thirsty"], "answer": "thirty", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "12. Do you have notebooks? Yes, we ___.", "options": ["do", "does", "are", "is"], "answer": "do", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "13. ___ many sheets?", "options": ["How", "What", "Where", "Who"], "answer": "How", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "14. I would like twenty-___ notebooks.", "options": ["five", "fifth", "fifteen", "fifty"], "answer": "five", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "15. One ___ sheets, please.", "options": ["hundred", "hundreds", "hungry", "hand"], "answer": "hundred", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "16. Big or ___?", "options": ["small", "black", "write", "paper"], "answer": "small", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "17. Is that ___?", "options": ["all", "some", "any", "one"], "answer": "all", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "18. I'll ___ one pack.", "options": ["take", "need", "be", "go"], "answer": "take", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "19. The pens are ___.", "options": ["black", "thirty", "office", "paper"], "answer": "black", "feedback": "Grammar point: be questions + numbers"}, {"type": "mcq", "text": "20. I need some things ___ my office.", "options": ["for", "on", "at", "in"], "answer": "for", "feedback": "Grammar point: be questions + numbers"}]}, "reading": {"text": "Huda goes to a stationery store in Riyadh. She needs things for her office. She buys thirty black pens, twenty-five small notebooks, and one hundred sheets of white paper. She also buys one pack of yellow sticky notes. The shop assistant is friendly.", "questions": [{"type": "mcq", "text": "1. Where does Huda go?", "options": ["a stationery store", "a hotel", "a hospital", "a beach"], "answer": "a stationery store", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "2. How many pens does she buy?", "options": ["thirty", "twenty-five", "fifty", "ten"], "answer": "thirty", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "3. What colour are the pens?", "options": ["black", "blue", "red", "green"], "answer": "black", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "4. How many notebooks?", "options": ["twenty-five", "thirty", "one hundred", "fifty"], "answer": "twenty-five", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "5. What colour are the sticky notes?", "options": ["yellow", "black", "white", "blue"], "answer": "yellow", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "6. Where does Huda go?", "options": ["a stationery store", "a hotel", "a hospital", "a beach"], "answer": "a stationery store", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "7. How many pens does she buy?", "options": ["thirty", "twenty-five", "fifty", "ten"], "answer": "thirty", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "8. What colour are the pens?", "options": ["black", "blue", "red", "green"], "answer": "black", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "9. How many notebooks?", "options": ["twenty-five", "thirty", "one hundred", "fifty"], "answer": "twenty-five", "feedback": "Read the text again and find the key words."}, {"type": "mcq", "text": "10. What colour are the sticky notes?", "options": ["yellow", "black", "white", "blue"], "answer": "yellow", "feedback": "Read the text again and find the key words."}]}, "speaking": ["What do you need from the store?", "How many pens do you want?", "Do you want small or big notebooks?", "What colour do you like?", "How much paper do you need?"], "listening": [{"title": "Exercise 1: At the Store", "audio": "CE L2 Listening U02.mp3", "script": "A customer buys office supplies: thirty black pens, twenty-five small notebooks, one hundred sheets of white paper, and one pack of yellow sticky notes.", "questions": [{"type": "match", "title": "Match the office item with the related word", "left": ["Pen", "Notebook", "Paper", "Sticky Notes", "Office"], "right": ["A. Write", "B. Small / Big", "C. Yellow", "D. Coffee", "E. Black", "F. Read", "G. One Hundred", "H. Computer"], "answer": ["E", "B", "G", "C", "H"]}, {"type": "mcq", "text": "Where does this conversation happen?", "options": ["In an office", "In a store", "At a school", "In a library"], "answer": "In a store", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "How many black pens does the customer want?", "options": ["13", "30", "33", "50"], "answer": "30", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "What kind of notebooks does she choose?", "options": ["The small ones", "The big ones", "The blue ones", "The expensive ones"], "answer": "The small ones", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "How many sheets of paper does she ask for?", "options": ["50", "100", "150", "200"], "answer": "100", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "How many sticky notes are in one pack?", "options": ["15", "25", "50", "100"], "answer": "50", "feedback": "Listen again and check the key words."}]}]}, {"id": 3, "title": "Food and City Life", "focus": "adjectives, food, shopping and likes", "vocabulary": [], "vocabQuestions": [{"type": "mcq", "text": "1. Hamad is in a café. He wants something hot to drink. He orders ____.", "options": ["rice", "chicken", "a hotel", "coffee"], "answer": "coffee", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "2. Noura writes from Abha: “The hotel is cheap and the food is fantastic.” This is like a ____.", "options": ["family tree", "holiday message", "phone number", "job form"], "answer": "holiday message", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "3. “Cheap” in “The hotel is cheap” means ____.", "options": ["very small", "not expensive", "very bad", "very old"], "answer": "not expensive", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "4. “Awful” is closest in meaning to ____.", "options": ["very cheap", "very friendly", "very bad", "very good"], "answer": "very bad", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "5. A place where you order tea, coffee, and snacks is a ____.", "options": ["café", "flat", "station", "school subject"], "answer": "café", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "6. The opposite of “friendly” is ____.", "options": ["fantastic", "expensive", "hungry", "unfriendly"], "answer": "unfriendly", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "7. “The mountains are fantastic.” Fantastic means ____.", "options": ["not friendly", "very good", "very expensive", "very small"], "answer": "very good", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "8. Which pair is only food?", "options": ["city and hotel", "cheap and expensive", "chicken and rice", "coffee and tea"], "answer": "chicken and rice", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "9. Which phrase is most natural in a café?", "options": ["Can I spell a coffee?", "Can I live a coffee?", "Can I phone a coffee?", "Can I have a black coffee, please?"], "answer": "Can I have a black coffee, please?", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "10. The plural of “man” is ____.", "options": ["men", "mans", "manies", "mens"], "answer": "men", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "11. The plural of “child” is ____.", "options": ["childs", "childrens", "childes", "children"], "answer": "children", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "12. “People” is the plural idea for ____.", "options": ["person", "city", "place", "sandwich"], "answer": "person", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "13. Which word completes the pair: man / woman, men / ____?", "options": ["womens", "women", "womans", "womanes"], "answer": "women", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "14. In a holiday message, “The weather is terrible” means it is ____.", "options": ["very bad", "very good", "very cheap", "very friendly"], "answer": "very bad", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "15. “The food is delicious” means it is ____.", "options": ["very cold", "very late", "very good to eat", "very cheap"], "answer": "very good to eat", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "16. Which word does NOT usually describe a place?", "options": ["beautiful", "expensive", "fantastic", "chicken"], "answer": "chicken", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "17. Which list contains only drinks?", "options": ["coffee, tea, water", "rice, pasta, chicken", "city, café, hotel", "cheap, sad, awful"], "answer": "coffee, tea, water", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "18. “A bottle of water” is used when you order ____.", "options": ["a country", "a job", "a surname", "a drink"], "answer": "a drink", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "19. The phrase “orange juice” is a kind of ____.", "options": ["nationality", "drink", "job", "place"], "answer": "drink", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "20. In “I’m in a fantastic hotel,” hotel is a ____.", "options": ["family member", "place to stay", "person", "drink"], "answer": "place to stay", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "21. Which word can describe people, hotels, and restaurants?", "options": ["rice", "coffee", "sandwich", "friendly"], "answer": "friendly", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "22. If a shop is not cheap, it may be ____.", "options": ["thirsty", "expensive", "friendly", "happy"], "answer": "expensive", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "23. Which phrase is correct café language?", "options": ["Any else thing?", "Else anything?", "Anything job?", "Anything else?"], "answer": "Anything else?", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "24. “For here or to take away?” is about ____.", "options": ["your job", "where you eat the food", "your nationality", "your phone number"], "answer": "where you eat the food", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "25. Which item is usually eaten, not drunk?", "options": ["water", "pasta", "tea", "coffee"], "answer": "pasta", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "26. Which answer fits “What’s your favourite food?”", "options": ["I’m a student.", "My favourite food is kabsa.", "I’m from Dammam.", "It’s 055."], "answer": "My favourite food is kabsa.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "27. “Typical food” means food that is ____.", "options": ["always bad", "very expensive only", "never eaten", "common in a place"], "answer": "common in a place", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "28. Which is a natural order in a café?", "options": ["A city and a hotel, please.", "A surname and a phone, please.", "A teacher and an engineer, please.", "A sandwich and a coffee, please."], "answer": "A sandwich and a coffee, please.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "29. Which adjective best fits: “The people are nice and helpful.”", "options": ["friendly", "awful", "expensive", "sad"], "answer": "friendly", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "30. Which sentence uses “favourite” correctly?", "options": ["My favourite is from Riyadh.", "My favourite phone is 055.", "My favourite job is twenty.", "My favourite drink is tea."], "answer": "My favourite drink is tea.", "feedback": "Think about the context, collocation, and unit vocabulary."}], "grammar": {"point": "this/that/these/those + adjectives", "examples": ["This shop is cheap.", "Those restaurants are expensive.", "The beach is fantastic.", "Omar is sad today."], "questions": [{"type": "mcq", "text": "Hamad is near you. Which question is correct?", "options": ["Who’s those man?", "Who are this man?", "Who’s these man?", "Who’s this man?"], "answer": "Who’s this man?", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "The shops are far from you. Which question is correct?", "options": ["What is these shops?", "What are those shops?", "What is those shops?", "What are that shops?"], "answer": "What are those shops?", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct sentence.", "options": ["These are my friends.", "This are my friends.", "These is my friends.", "Those is my friends."], "answer": "These are my friends.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct plural.", "options": ["two child", "two childrens", "two children", "two childs"], "answer": "two children", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: The restaurants ____ cheap.", "options": ["am not", "don’t", "aren’t", "isn’t"], "answer": "aren’t", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: The food ____ fantastic.", "options": ["are", "am", "be", "is"], "answer": "is", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: We ____ in Riyadh today.", "options": ["are", "is", "am", "be"], "answer": "are", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: They ____ from Saudi Arabia.", "options": ["is", "am", "be", "are"], "answer": "are", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: This ____ a good café.", "options": ["am", "be", "is", "are"], "answer": "is", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: These ____ good cafés.", "options": ["is", "am", "be", "are"], "answer": "are", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct negative.", "options": ["They not expensive.", "They no expensive.", "They aren’t expensive.", "They isn’t expensive."], "answer": "They aren’t expensive.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: ____ this your coffee?", "options": ["Is", "Are", "Am", "Be"], "answer": "Is", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: ____ these your books?", "options": ["Be", "Are", "Is", "Am"], "answer": "Are", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct answer: Are they students?", "options": ["Yes, they’re not.", "Yes, they are.", "Yes, they is.", "Yes, they do."], "answer": "Yes, they are.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct answer: Is that your phone?", "options": ["No, it are.", "No, I’m not.", "No, it isn’t.", "No, they aren’t."], "answer": "No, it isn’t.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Look at ____ people over there.", "options": ["a", "those", "this", "that"], "answer": "those", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Look at ____ sandwich here.", "options": ["those", "they", "this", "these"], "answer": "this", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: It ____ a cheap hotel.", "options": ["isn’t", "aren’t", "don’t", "am not"], "answer": "isn’t", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: The people ____ friendly.", "options": ["be", "are", "is", "am"], "answer": "are", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I ____ in a nice restaurant.", "options": ["be", "am", "is", "are"], "answer": "am", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct question.", "options": ["Are that your friends?", "Those are your friends?", "Are those your friends?", "Is those your friends?"], "answer": "Are those your friends?", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: The apples ____ fresh.", "options": ["are", "is", "am", "be"], "answer": "are", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: The city ____ very busy.", "options": ["is", "are", "am", "be"], "answer": "is", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: ____ are my children.", "options": ["This", "That", "It", "These"], "answer": "These", "feedback": "Review the unit language, then try again."}]}, "reading": {"text": "Reading – Jonathan’s Family\n\nDear Marta,\n\nI’m going to tell you about my family. I live with my little sister, mum and dad. We live in London, although I was born in Lancaster, a beautiful city in the North of England. My dad’s name is Pierre. He’s from France, and he speaks English and French. When he was young, my mother went to France on a student exchange, and they met there. A few years later, my dad moved to England and married my mum. He works as a French teacher. He’s very tall and athletic. He’s got short blonde hair and blue eyes.\n\nMy mum’s name is Anna. She’s English. She’s quite short, and she’s got long curly brown hair and brown eyes. She works at a café near our home. She can speak French too! My sister Julia is 18 years old, and she’s got the same color of hair and eyes as my father. She loves playing the piano and dancing. She’s very talented, and she would like to be a professional musician.\n\nI’ve got short blonde hair like my dad, but brown eyes like my mum. We all love playing board games together on Friday evenings, and we always order pizza. Our favourite game is Monopoly. Oh, I almost forgot — we’ve also got a pet cat, Snowball. She’s all white and has got a lot of fur. She likes sleeping on me.\n\nLove,\nJonathan\n\n---\n\nReading – What Are Stars?\n\nThe sun has set. I see a red-and-orange glow in the sky. Soon it gets dark outside. Now I see stars in the sky. There are so many! Stars are made of hot gases. They give off their own light. Some stars look white. Others may look blue, red, or gold. Stars are different sizes. They can be big or small. The sun is a star. It is the star closest to Earth. The other stars are farther away. That is why they look so small. In fact, some faraway stars are bigger than the sun.", "questions": [{"type": "mcq", "text": "Jonathan was born in London.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "His parents both speak more than one language.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "They got married in France.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Jonathan's mother is shorter than his father.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "She doesn't work far from home.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Jonathan's sister has got blue eyes.", "options": ["True", "False"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Julia works as a singer.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Jonathan's hair is the same colour as his mother's.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Stars are made of hot gases.", "options": ["False", "True"], "answer": "True", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "The sun is not a star.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Why do faraway stars appear smaller than the sun?", "options": ["They are smaller in size", "They are less bright", "They are farther away from Earth", "They are cooler in temperature"], "answer": "They are farther away from Earth", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "All stars look the same.", "options": ["True", "False"], "answer": "False", "feedback": "Read the text carefully, then choose the best answer."}]}, "speaking": ["Describe Khafji in three words.", "What food do you like?", "What food don't you like?", "Where do you go shopping?", "What is your favourite drink?"], "listening": [{"title": "Exercise 1: Khafji City", "audio": "CE L2 Listening U03 Ex1 MP3.mp3", "script": "Sultan talks about Energytech and Khafji. He says Omar is sad today, the shop is cheap, restaurants are expensive, the man is friendly, and the beach is fantastic.", "questions": [{"type": "match", "title": "Match each person or place with the correct adjective", "left": ["Today, Omar is", "The shop is", "Some big restaurants are", "The man is", "The beach in Khafji is"], "right": ["A. expensive", "B. fantastic", "C. happy", "D. sad", "E. unfriendly", "F. cheap", "G. friendly", "H. awful"], "answer": ["D", "F", "A", "G", "B"]}]}, {"title": "Exercise 2: Shopping and Café", "audio": "CE L2 Listening U03 Ex2.mp3", "script": "Fahad and Omar buy food in a mall, then order drinks in a café. They decide to cook chicken and rice.", "questions": [{"type": "tf", "text": "Fahad and Omar are at a supermarket to buy food for their homes.", "options": ["True", "False"], "answer": "True", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "Omar needs fruit and Fahad needs vegetables.", "options": ["True", "False"], "answer": "False", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "They decide to cook pasta for dinner.", "options": ["True", "False"], "answer": "False", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "At the café, Fahad orders a bottle of water and a coffee.", "options": ["True", "False"], "answer": "False", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "Omar thinks the café is expensive but likes friendly people.", "options": ["True", "False"], "answer": "True", "feedback": "Check the sentence in the audio."}, {"type": "order", "title": "Put the actions in order", "items": ["They buy fruit and vegetables.", "They talk about breakfast food.", "They choose chicken and rice.", "They sit in a café.", "They order drinks."], "answer": [1, 2, 3, 4, 5]}]}, {"title": "Exercise 3: Likes and Dislikes", "audio": "CE L2 Listening U03 Ex3.mp3", "script": "Ahmed and Sultan talk about Jeddah, a hotel, Kabsa, mint tea, and suitcase colours.", "questions": [{"type": "mcq", "text": "Sultan was in Jeddah ...", "options": ["on business", "on holiday", "to visit Ahmed", "to study"], "answer": "on business", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "The hotel in Jeddah was ...", "options": ["weak", "horrible", "expensive", "beautiful"], "answer": "beautiful", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "What is Ahmed’s favourite food?", "options": ["seafood", "Kabsa", "fish and chips", "chicken"], "answer": "Kabsa", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "What is Sultan’s favourite drink?", "options": ["cola", "juice", "mint tea", "coffee"], "answer": "mint tea", "feedback": "Listen again and check the key words."}, {"type": "mcq", "text": "What is Sultan’s favourite colour?", "options": ["black", "orange", "blue", "brown"], "answer": "orange", "feedback": "Listen again and check the key words."}]}]}, {"id": 4, "title": "My Town", "focus": "places in town, there is/are, daily life", "vocabulary": [], "vocabQuestions": [{"type": "mcq", "text": "1. A place where you can watch a film is a ____.", "options": ["park", "bus stop", "cinema", "bank"], "answer": "cinema", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "2. A place where you can get money is a ____.", "options": ["mountain", "bank", "café", "river"], "answer": "bank", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "3. You wait for public transport at a ____.", "options": ["lake", "hotel room", "bus stop", "restaurant"], "answer": "bus stop", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "4. A place where travellers can sleep is a ____.", "options": ["supermarket", "park", "bridge", "hotel"], "answer": "hotel", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "5. A place where you buy foo "13. A map helps you find ____.", "options": ["nationalities", "jobs", "phone numbers", "places"], "answer": "places", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "14. “Turn right” is used for ____.", "options": ["food orders", "family profiles", "dates", "directions"], "answer": "directions", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "15. Which sentence is a good town description?", "options": ["There is a teacher coffee.", "The mountain is a job.", "My surname is cinema.", "There are some good cafés near the beach."], "answer": "There are some good cafés near the beach.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "16. If a town has many shops, cafés, and hotels, it is probably ____.", "options": ["empty", "ill", "hungry", "busy"], "answer": "busy", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "17. Which word does NOT belong to town places?", "options": ["park", "cinema", "daughter", "bank"], "answer": "daughter", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "18. A train station is a place for ____.", "options": ["sleeping at night", "travel", "eating dinner only", "watching films only"], "answer": "travel", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "19. A park is a place where people can ____.", "options": ["buy money", "catch a plane", "cook in a kitchen", "walk and relax"], "answer": "walk and relax", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "20. “In the city centre” means ____.", "options": ["outside the country", "under the sea", "behind a mountain", "in the middle of the city"], "answer": "in the middle of the city", "feedback": "Think about the context, collocation, and uni mation centre?", "options": ["an", "a", "some", "any"], "answer": "an", "feedback": "Review the unit language, then try again."}]}, "reading": {"text": "Reading – A Day in the Life of a Pilot\n\nCarole is an airplane pilot. She usually works during the week and has weekends off, but she sometimes works Saturdays or Sundays. When Carole has to work, her day usually starts very early in the morning. She wakes up at 4 a.m. and gets ready for work. She has a shower and gets dressed. She wears a uniform. At 4.30, Carole has fruit with milk and drinks a large coffee. At 5 o’clock, she gets in her car and drives to the airport. Before the flight, she meets the rest of the crew. During the flight, she talks to passengers and gives information about the flight. After work, Carole drives home. She arrives home at 5 p.m. At home, she does yoga for 30 minutes. Then she cooks dinner and has dinner at 7 p.m. She usually goes to bed very early, at 9 p.m. Sometimes she reads a book for one hour before sleeping.\n\n---\n\nReading – Soccer Is a Great Game\n\nSoccer is a team sport. Two teams play. Each team has eleven players. The players try to kick the ball into the other team’s goal. If the ball goes into the goal, their team gets a point. Soccer players have different jobs. The goalkeeper’s job is to protect the goal. Defenders try to get the ball away from the other team. Forwards try to kick the ball into the other team’s goal. Games usually last ninety minutes. The team with the most points is the winner!", "questions": [{"type": "mcq", "text": "How many days does Carole usually fly every week?", "options": ["Two", "Four", "Five"], "answer": "Five", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does Carole do at 4.30?", "options": ["She wakes up", "She eats breakfast", "She packs her bag"], "answer": "She eats breakfast", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What do  "Does you live with your family?"], "answer": "Do you live with your family?", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Choose the correct short answer.", "options": ["Yes, I does.", "Yes, I do.", "Yes, I live.", "Yes, I am do."], "answer": "Yes, I do.", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Where ____ you live?", "options": ["does", "are", "is", "do"], "answer": "do", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: What ____ you do?", "options": ["is", "do", "does", "are"], "answer": "do", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Do you ____ languages?", "options": ["to study", "study", "studies", "studying"], "answer": "study", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I work ____ a big company.", "options": ["at", "to", "for", "on"], "answer": "for", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I go to work ____ bus.", "options": ["by", "on", "in", "at"], "answer": "by", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I live ____ my parents.", "options": ["by", "with", "for", "to"], "answer": "with", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: My parents ____ in Al Khobar.", "options": ["live", "lives", "living", "to live"], "answer": "live", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: We don’t ____ in a house.", "options": ["to live", "live", "lives", "living"], "answer": "live", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: ____ your brothers study English?", "options": ["Do", "Does", "Are", "Is"], "answer": "Do", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: My sister and I ____ in a flat.", "options": ["lives", "living", "to live", "live"], "answer": "live", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: My uncle’s son is my ____.", "options": ["cousin", "nephew", "grandson", "father"], "answer": "cousin", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: My father’s mother is my ____.", "options": ["aunt", "daughter", "wife", "grandmother"], "answer": "grandmother", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: I ____ any children.", "options": ["am not have", "haven’t a", "don’t have", "doesn’t have"], "answer": "don’t have", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: Do you have ____ brothers?", "options": ["some", "any", "a", "an"], "answer": "any", "feedback": "Review the unit language, then try again."}, {"type": "mcq", "text": "Complete: My mother ____ Arabic and English.", "options": ["speaks", "speak", "speaking", "to speak"], "answer": "speaks", "feedback": "Review the unit language, then try again."}]}, "reading": {"text": "Reading – Janet’s Routine\n\nJanet is an athlete, and she wakes up at 4:30 a.m. every weekday morning. She spends the first 30 minutes reading and then 15 minutes meditating. At 5:15 a.m. Janet checks her email for only 30 minutes. She runs for an hour and a half along the lake near her house. After running, Janet has a shower and prepares breakfast, which is usually cereal and fruit. She never has unhealthy breakfast. At 8:20 she leaves the house and goes to training. She trains for three hours with her team. After lunch, she has a nap for one hour. In the evening, she meets friends. She typically goes to bed at 9 p.m. because she wants to be awake in the morning at night. She sometimes falls asleep listening to music, but she never watches television or reads on her tablet. She always makes sure her alarm is set and is almost always asleep by 9:45 p.m.\n\n---\n\nReading – My Daily Routine\n\nI wake up at 7:00 AM every day. I start my day by making my bed and then go to the bathroom. After that, I brush my teeth and wash my face. For breakfast, I usually have a bowl of cereal with milk and a cup of tea. I leave my house at 8:00 AM and take the bus to work. My work starts at 9:00 AM. I work in an office, and I spend most of my day in front of a computer. I have lunch at 1:00 PM with my colleagues. We usually eat sandwiches or salads. After work, I go to the gym for an hour to exercise. I enjoy running on the treadmill. In the evening, I cook dinner at home, and I usually eat with my family. After dinner, I watch TV or read a book. I go to bed around 11:00 PM to get enough sleep for the next day.", "questions": [{"type": "mcq", "text": "What time does she finish checking her emails?", "options": ["5:30 AM", "5:45 AM", "6:00 AM"], "answer": "5:45 AM", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "How long does she run in the morning?", "options": ["45 minutes", "60 minutes", "90 minutes"], "answer": "90 minutes", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Janet _____ has a healthy breakfast.", "options": ["always", "never", "usually"], "answer": "usually", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "How many times does she meditate?", "options": ["Once or twice a day", "Once a day", "Never"], "answer": "Once or twice a day", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does Janet do to help her get to sleep?", "options": ["listen to music", "read on her tablet", "watch TV"], "answer": "listen to music", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What is the last thing she does before going to sleep?", "options": ["She reads.", "She sets her alarm.", "She plays football."], "answer": "She sets her alarm.", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Which option best describes the person’s morning routine?", "options": ["He wakes up, eats breakfast, then brushes his teeth.", "He wakes up, washes his hands, then goes to work.", "He wakes up, makes his bed, then eats breakfast.", "He wakes up, starts work, then eats breakfast."], "answer": "He wakes up, makes his bed, then eats breakfast.", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does the person do at 8:00 AM?", "options": ["Eat breakfast", "Start work", "Leaves the house for work", "Finishes work"], "answer": "Leaves the house for work", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does the person have for breakfast most days?", "options": ["A sandwich and tea", "Cereal with milk and a cup of tea", "Fruit and toast", "Cereal with tea and a cup of milk"], "answer": "Cereal with milk and a cup of tea", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "How does the person usually get to work?", "options": ["By bus", "By car", "On foot", "By bicycle"], "answer": "By bus", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "The person spends most of the day doing what?", "options": ["Running on the treadmill", "Working at his desk", "Meeting colleagues", "Reading books"], "answer": "Working at his desk", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What time is the person’s lunch?", "options": ["12:00 PM", "11:00 AM", "1:00 PM", "2:00 PM"], "answer": "1:00 PM", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "Why does the person go to the gym after work?", "options": ["To meet friends", "To relax", "To exercise", "To watch TV"], "answer": "To exercise", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "What does the person enjoy doing at the gym?", "options": ["Swimming", "Lifting weights", "Playing basketball", "Exercising on the treadmill"], "answer": "Exercising on the treadmill", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "How does the person relax in the evening?", "options": ["By going to the gym", "By reading a book or watching TV", "By working", "By having dinner with friends"], "answer": "By reading a book or watching TV", "feedback": "Read the text carefully, then choose the best answer."}, {"type": "mcq", "text": "The person goes to bed around 11:00 PM to _____.", "options": ["finish work", "watch TV", "get enough sleep for the next day", "read a book"], "answer": "get enough sleep for the next day", "feedback": "Read the text carefully, then choose the best answer."}]}, "speaking": ["Where do you live?", "Who do you live with?", "Do you live in a house or flat?", "How do you go to work?", "What do you do at the weekend?"], "listening": [{"title": "Exercise 1: The New Apartment", "audio": "CE L2 Listening U05 EX.1.mp3", "script": "Jamie calls Tom from her new apartment. It has one bedroom and one living room, a new kitchen, a white fridge, and the rent is $700.", "questions": [{"type": "match", "title": "Match home words with descriptions", "left": ["Apartment", "Kitchen", "Supermarket", "Street", "Rent"], "right": ["A. Clean / New", "B. School", "C. Car", "D. Seven Hundred Dollars", "E. Park", "F. Green", "G. Buy Food", "H. Big / Small"], "answer": ["H", "A", "G", "F", "D"]}, {"type": "tf", "text": "Jamie is calling from her old apartment.", "options": ["True", "False"], "answer": "False", "feedback": "Check the sentence in the audio."}, {"type": "tf", "text": "Her apartment is on Green Street and has two bedrooms.", "option ary."}, {"type": "mcq", "text": "7. Which sentence is about dislike?", "options": ["I don’t like football.", "I love football.", "Football is my favourite.", "I’m interested in football."], "answer": "I don’t like football.", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "8. Which word completes: “I’m interested ____ cooking.”", "options": ["at", "for", "in", "on"], "answer": "in", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "9. Which one is a musical instrument?", "options": ["dog", "guitar", "basketball", "magazine"], "answer": "guitar", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "10. Which word is an animal?", "options": ["shopping", "computer", "horse", "piano"], "answer": "horse", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "11. Which word does NOT belong with free-time activities?", "options": ["surname", "watch TV", "cook a meal", "go to the cinema"], "answer": "surname", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "12. Which phrase means “use the internet to speak to friends”?", "options": ["read newspapers", "chat online", "cook foreign food", "play basketball"], "answer": "chat online", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "13. Which food phrase is correct?", "options": ["foreign music food", "food foreign", "foods foreigner", "foreign food"], "answer": "foreign food", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "14. Which phrase is common?", "options": ["quickly food", "speed food", "fastly food", "fast food"], "answer": "fast food", "feedback": "Think about the context, collocation, and unit vocabulary."}, {"type": "mcq", "text": "15. Which phrase is about sport?", "opti
